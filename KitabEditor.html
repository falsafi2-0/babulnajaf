<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محرر النصوص - v1.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0d;--bg2:#141416;--bg3:#1a1a1d;--bg4:#212125;
  --border:#252529;--border2:#32323a;
  --text:#dedad3;--text2:#8a8780;--text3:#4a4845;
  --accent:#c4954a;--accent2:#7a5520;--accentbg:rgba(196,149,74,0.07);
  --danger:#a84a4a;--success:#4a8a64;--r:5px;--r2:9px;
}
body.light{
  --bg:#f5f3ef;--bg2:#eceae5;--bg3:#e2dfd9;--bg4:#d8d5ce;
  --border:#ccc9c0;--border2:#b8b4aa;
  --text:#2a2520;--text2:#6a6560;--text3:#9a9590;
  --accent:#a0722a;--accent2:#c49050;--accentbg:rgba(160,114,42,0.08);
  --danger:#8a3030;--success:#2a6a44;
}
#filename-input{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:3px 9px;border-radius:var(--r);font-family:'IBM Plex Mono',monospace;font-size:10px;outline:none;width:130px;transition:border-color 0.12s}
#filename-input:focus{border-color:var(--accent);color:var(--text)}
#filename-input::placeholder{color:var(--text3)}
#theme-btn{background:none;border:1px solid var(--border2);color:var(--text3);width:26px;height:26px;border-radius:var(--r);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0}
#theme-btn:hover{border-color:var(--accent);color:var(--accent)}
#block-preview-strip{flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg2);direction:rtl;display:flex;flex-direction:column}
#block-preview-strip.hidden{display:none}
#bps-header{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;border-bottom:1px solid var(--border);flex-shrink:0;direction:ltr}
#bps-header span{font-size:10px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase}
#bps-toggle{background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;padding:1px 5px;border-radius:var(--r);transition:color 0.12s}
#bps-toggle:hover{color:var(--text2)}
#bps-content{height:90px;overflow-y:auto;overflow-x:hidden;padding:10px 16px;scrollbar-width:none;direction:rtl}
#bps-content::-webkit-scrollbar{display:none}
#bps-content.collapsed{display:none}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:12px}

/* ── TOP BAR ── */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:40px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;direction:ltr}
.tabs{display:flex;gap:1px}
.tab{background:none;border:none;color:var(--text3);padding:5px 12px;border-radius:var(--r);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;transition:color 0.12s,background 0.12s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);background:var(--accentbg)}
.topbar-right{display:flex;gap:6px;align-items:center}
.exp-btn{background:none;border:1px solid var(--border2);color:var(--text3);padding:4px 10px;border-radius:var(--r);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.06em;transition:border-color 0.12s,color 0.12s}
.exp-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── WORKSPACE ── */
#workspace{display:flex;flex:1;overflow:hidden;direction:ltr}

/* ── EDIT VIEW ── */
#edit-view{display:flex;flex:1;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
#edit-view::-webkit-scrollbar{width:3px}
#edit-view::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#blocks-wrap{display:flex;flex-direction:column;gap:6px;padding:10px 10px 0;background:var(--bg)}
.block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;flex-shrink:0;transition:border-color 0.12s}
.block:focus-within{border-color:var(--border2)}
.block-toolbar{display:flex;align-items:center;gap:5px;padding:5px 8px;border-bottom:1px solid var(--border);background:var(--bg3);direction:ltr}
.block-style-select{flex:1;background:var(--bg4);border:1px solid var(--border);color:var(--text2);padding:3px 7px;border-radius:var(--r);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;outline:none;transition:border-color 0.12s}
.block-style-select:focus{border-color:var(--accent)}
.block-style-select option{background:var(--bg3)}
.block-btn{background:none;border:1px solid var(--border);color:var(--text3);width:22px;height:22px;border-radius:var(--r);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0;line-height:1}
.block-btn:hover{background:var(--bg4);color:var(--text2);border-color:var(--border2)}
.block-btn.del:hover{border-color:var(--danger);color:var(--danger)}
.block-btn.ins:hover{border-color:var(--success);color:var(--success)}
.block-textarea{display:block;width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'Noto Nastaliq Urdu',serif;font-size:16px;line-height:2;padding:10px 12px;resize:none;overflow:hidden;direction:rtl;text-align:right;min-height:56px}
.line-block-preview{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin:4px 6px}
.block-textarea::placeholder{color:var(--text3)}
#add-block-footer{padding:10px;background:var(--bg);flex-shrink:0;display:flex;justify-content:center}
#add-block-btn{background:none;border:1px dashed var(--border2);color:var(--text3);padding:7px 24px;border-radius:var(--r2);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;transition:border-color 0.2s,color 0.2s}
#add-block-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── RICH CONTAINER ── */
.block.is-rich{border-color:var(--accent2)!important}
.rich-container-body{padding:8px;background:var(--bg);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.rich-child-wrap{display:flex;gap:8px;width:100%}
.rich-child-wrap .block{border:1px solid var(--border);border-radius:6px;margin:0}
.rich-child-wrap .block:focus-within{border-color:var(--accent2)}
.rich-child-wrap .block-textarea{min-height:48px}
.rich-toggle-btn{background:none;border:1px solid var(--border);color:var(--text3);width:26px;height:26px;min-width:26px;border-radius:var(--r);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0}
.rich-toggle-btn:hover,.rich-toggle-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accentbg)}
.rich-style-select{background:var(--bg4);border:1px solid var(--accent2);color:var(--accent);padding:3px 6px;border-radius:var(--r);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;outline:none;max-width:100px}
.rich-style-select option{background:var(--bg3)}
.rich-add-child-btn{background:none;border:1px dashed var(--border2);color:var(--text3);padding:4px 0;border-radius:var(--r);cursor:pointer;font-size:10px;font-family:'IBM Plex Mono',monospace;transition:all 0.12s;width:100%;text-align:center;margin-top:2px}
.rich-add-child-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── RICH STYLE PANEL SECTION ── */
#rich-styles-section{border-top:1px solid var(--border);padding-top:6px;margin-top:4px}
#rich-styles-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px}
#rich-styles-title{font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
#add-rich-style-btn{background:none;border:1px solid var(--border2);color:var(--text3);padding:3px 8px;border-radius:var(--r);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;transition:all 0.12s}
#add-rich-style-btn:hover{border-color:var(--accent);color:var(--accent)}
#rich-styles-list{padding:0 6px 6px}
.rich-style-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:var(--r);cursor:pointer;transition:background 0.1s}
.rich-style-item:hover{background:var(--bg3)}
.rich-style-name{font-size:12px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rich-style-badge{font-size:9px;color:var(--accent);border:1px solid var(--accent2);padding:1px 5px;border-radius:3px;letter-spacing:0.04em}

/* ── RICH BLOCK ── */
.rich-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.rich-block-toolbar{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;gap:6px;padding:5px 10px;background:var(--bg4);border-bottom:1px solid var(--border);direction:ltr}
.rich-block-label{font-size:10px;color:var(--accent);letter-spacing:0.06em;text-transform:uppercase;flex:1;font-family:'IBM Plex Mono',monospace}
.rich-inner-wrap{display:flex;flex-direction:column;gap:4px;padding:6px}
.rich-inner-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.rich-inner-toolbar{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;gap:4px;padding:4px 8px;background:var(--bg4);border-bottom:1px solid var(--border);direction:ltr}
.rich-inner-select{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:var(--r);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;outline:none}
.rich-inner-select:focus{border-color:var(--accent)}
.rich-inner-select option{background:var(--bg3)}
.rich-inner-btn{background:none;border:1px solid var(--border);color:var(--text3);width:22px;height:22px;min-width:22px;border-radius:var(--r);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0}
.rich-inner-btn:hover{background:var(--bg2);color:var(--text);border-color:var(--border2)}
.rich-inner-btn.del:hover{border-color:var(--danger);color:var(--danger)}
.rich-inner-btn.add:hover{border-color:var(--success);color:var(--success)}
.rich-inner-textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);padding:8px 10px;resize:none;overflow:hidden;direction:rtl;text-align:right;min-height:50px;font-size:14px;line-height:1.8}
.rich-add-inner{display:flex;justify-content:center;padding:4px}
.rich-add-inner-btn{background:none;border:1px dashed var(--border2);color:var(--text3);padding:3px 16px;border-radius:var(--r);cursor:pointer;font-size:10px;font-family:'IBM Plex Mono',monospace;transition:all 0.12s}
.rich-add-inner-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── STYLE PANEL (editor) ── */
#panel{width:210px;flex-shrink:0;border-left:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
#style-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.style-tab-btn{flex:1;background:none;border:none;color:var(--text3);padding:7px 0;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.05em;cursor:pointer;transition:color 0.12s,border-color 0.12s;border-bottom:2px solid transparent}
.style-tab-btn:hover{color:var(--text2)}
.style-tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
 #panel-header{padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:4px;align-items:center}
 #panel-header button{white-space:nowrap}
#add-style-btn{width:100%;background:var(--accentbg);border:1px solid var(--accent2);color:var(--accent);padding:5px 8px;border-radius:var(--r);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.04em;transition:background 0.15s,color 0.15s}
#add-style-btn:hover{background:var(--accent);color:var(--bg)}
#styles-list,#rich-styles-list{flex:1;overflow-y:auto;padding:4px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
#styles-list::-webkit-scrollbar,#rich-styles-list::-webkit-scrollbar{width:2px}
#styles-list::-webkit-scrollbar-thumb,#rich-styles-list::-webkit-scrollbar-thumb{background:var(--border2)}
.style-section{display:none;flex-direction:column;flex:1;overflow:hidden}
.style-section.active{display:flex}
.style-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:var(--r);transition:background 0.1s}
.style-item:hover{background:var(--bg3)}
.style-name{flex:1;font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;text-align:right}
.style-badge{font-size:8px;color:var(--text3);border:1px solid var(--border);padding:1px 4px;border-radius:3px;flex-shrink:0;letter-spacing:0.05em;text-transform:uppercase}
.gear-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:2px 3px;border-radius:3px;transition:color 0.12s,background 0.12s;flex-shrink:0}
.gear-btn:hover{color:var(--accent);background:var(--accentbg)}

/* ══════════════════════════════════════
   PREVIEW VIEW — full area, position:relative
══════════════════════════════════════ */
#preview-view{
  display:none;flex:1;overflow:hidden;
  background:#f4f1eb;
  position:relative;
}
#preview-view.active{display:block}

/* ── SCROLLABLE CONTENT — padded so it doesn't go under fixed cards ── */
#pv-content{
  position:absolute;inset:0;
  overflow-y:auto;
  /* right padding leaves room for the nav card (200px card + 16px gap + 16px breathing = 232px) */
  padding:24px 248px 60px 60px;
  scrollbar-width:none;
  direction:rtl;
  --font-scale:1;
}
#pv-content::-webkit-scrollbar{display:none}
#pv-content mark.sh{background:rgba(196,149,74,0.3);border-radius:2px;padding:0 1px;color:inherit}

/* ── PINS ── */
.kb-pin-panel{position:fixed;top:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:3px;pointer-events:none}
.kb-pin-panel>*{pointer-events:auto}
.kb-pin-dot{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:transform 0.12s}
.kb-pin-dot:hover{transform:scale(1.2)}
/* ── TREE/FLAT TOGGLE ── */
#tree-toggle{position:fixed;top:4px;left:50%;transform:translateX(-50%);z-index:55;font-size:10px;padding:3px 14px;border-radius:999px;border:1px solid #c4954a;background:#fff;color:#c4954a;cursor:pointer;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em;display:none}#tree-toggle:hover{background:#c4954a;color:#fff}
#preview-view.active #tree-toggle{display:block}
/* ── COLLAPSIBLE TREE ── */
.h-node{}
.h-children.collapsed,.h-content.collapsed{display:none}
.h-arrow{cursor:pointer;user-select:none;font-size:12px;margin-left:4px;flex-shrink:0;transition:transform 0.15s}
.h-arrow:hover{opacity:0.7}
/* ── FIXED SEARCH CARD — top center ── */
#pv-search-card{
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:440px;
  z-index:20;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#pv-search-body{
  width:100%;
  background:#fff;
  border:1px solid #e0ddd6;
  border-top:none;
  border-radius:0 0 14px 14px;
  box-shadow:0 6px 24px rgba(0,0,0,0.07);
  overflow:hidden;
  max-height:0;
  transition:max-height 0.22s ease;
}
#pv-search-body.open{max-height:260px}

#pv-search-row{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px 8px;
  direction:ltr;
}
#pv-search-input{
  flex:1;border:1px solid #e0ddd6;border-radius:20px;
  padding:5px 14px;font-family:'IBM Plex Mono',monospace;
  font-size:11px;outline:none;background:#faf8f4;color:#3a3530;
  transition:border-color 0.15s;
}
#pv-search-input:focus{border-color:#c4954a}
#pv-search-count{font-size:10px;color:#aaa;white-space:nowrap;font-family:'IBM Plex Mono',monospace;min-width:48px}
#pv-search-clear{background:none;border:none;color:#ccc;cursor:pointer;font-size:12px;padding:2px 4px;transition:color 0.12s}
#pv-search-clear:hover{color:#c4954a}

/* results */
#pv-search-results{
  padding:0 14px 8px;direction:rtl;
  overflow-y:auto;max-height:160px;
}
#pv-search-results::-webkit-scrollbar{width:0}
.sr-item{display:flex;flex-direction:column;gap:2px;padding:6px 8px;border-radius:5px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid #f0ece3}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:#f0ece3}
.sr-parent{font-size:9px;color:#c4954a;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em}
.sr-snippet{font-size:13px;color:#5a5550;font-family:'Amiri',serif;line-height:1.4;direction:rtl}
.sr-snippet mark{background:rgba(196,149,74,0.35);border-radius:2px;padding:0 1px;color:inherit}
.sr-empty{font-size:10px;color:#bbb;padding:8px 0;font-family:'IBM Plex Mono',monospace;text-align:center}

/* ∧ ∨ toggle tab — bottom edge of search card */
#pv-search-toggle{
  width:32px;height:13px;
  background:#fff;
  border:1px solid #e0ddd6;
  border-top:none;
  border-radius:0 0 8px 8px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:#ccc;
  transition:color 0.12s;
  box-shadow:0 3px 8px rgba(0,0,0,0.04);
  flex-shrink:0;
}
#pv-search-toggle:hover{color:#c4954a}

/* ── FIXED NAV CARD — right side ── */
/* nav wrapper - positions nav panel */
#pv-nav-wrap{
  position:fixed;
  top:16px;
  right:16px;
  z-index:15;
}

/* nav panel */
#pv-nav{
  position:relative;
  width:200px;
  max-height:calc(100vh - 32px);
  background:#fff;
  border:1px solid #e0ddd6;
  border-radius:14px;
  box-shadow:0 6px 24px rgba(0,0,0,0.07);
  display:flex;
  flex-direction:column;
  overflow:visible;
  transition:transform 0.25s ease;
}
#pv-nav.closed{
  transform:translateX(220px);
}

/* toggle button - at left edge of nav, moves with it */
#pv-nav-toggle{
  position:absolute;
  top:20px;
  left:-20px;
  width:20px;
  height:40px;
  background:#fff;
  border:1px solid #ddd;
  border-right:none;
  border-radius:8px 0 0 8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:#666;
  z-index:20;
  box-shadow:-2px 0 6px rgba(0,0,0,0.1);
  transition:background 0.15s,color 0.15s;
}
#pv-nav-toggle:hover{color:#c4954a;background:#f5f5f5}

@media (max-width:600px){
  #pv-nav-wrap{top:10px;right:10px}
  #pv-nav{width:160px;max-height:calc(100vh - 20px)}
  #pv-nav.closed{transform:translateX(180px)}
  #pv-nav-toggle{top:15px;left:-18px;height:36px}
}

#pv-nav-inner{
  flex:1;overflow-y:auto;
  padding:12px 10px;
  direction:rtl;
  scrollbar-width:none;
}
#pv-nav-inner::-webkit-scrollbar{display:none}

#pv-nav-title{
  font-size:9px;letter-spacing:0.1em;text-transform:uppercase;
  color:#b5b0a5;margin-bottom:8px;
  font-family:'IBM Plex Mono',monospace;direction:ltr;
}

/* recently searched section */
.recent-more{font-size:9px;color:var(--accent);cursor:pointer;padding:4px 0 2px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em;text-align:center;direction:ltr}
.recent-more:hover{opacity:0.7}
.recent-item{font-size:12px;color:var(--text2);font-family:'Amiri',serif;direction:rtl;text-align:right;padding:4px 6px;border-radius:4px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;border-bottom:1px solid var(--border);margin-bottom:2px}
.recent-item:last-of-type{border-bottom:none}
.recent-item:hover{background:var(--bg3);color:var(--text)}
#pv-nav-recent{
  flex-shrink:0;
  border-top:1px solid #f0ece3;
  padding:8px 10px;
}
#pv-nav-recent-title{
  font-size:9px;letter-spacing:0.08em;text-transform:uppercase;
  color:#c4954a;margin-bottom:6px;
  font-family:'IBM Plex Mono',monospace;direction:ltr;
}
.recent-item{
  font-size:11px;color:#8a8078;
  font-family:'Amiri',serif;
  direction:rtl;text-align:right;
  padding:3px 4px;border-radius:3px;
  cursor:pointer;transition:color 0.1s,background 0.1s;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  line-height:1.5;
}
.recent-item:hover{color:#3a3530;background:#f4f1eb}

const esc=t=>String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const getStyle=id=>styles.find(s=>s.id===id)||styles[0];
function opacityHex(v){return Math.round(Math.min(100,v)*2.55).toString(16).padStart(2,'0');}
function gradDir(d){
  return {right:'to right',left:'to left',top:'to bottom',bottom:'to top'}[d]||'to right';
}
function ornamentalToHTML(s){
  if(s.type==='symbol'){
    const sc=s.symColor||'#c4954a';
    const so=opacityHex(s.symOpacity||80);
    const sod=gradDir(s.symOpacityDir||'right');
    const ss=s.symSize||24;
    const sy=s.symChar||'✦';
    const aPos=s.symAccent||'center';
    let symStyle='';
    if(aPos==='left')symStyle='margin-right:auto';
    else if(aPos==='right')symStyle='margin-left:auto';
    else if(aPos==='top')symStyle='margin-bottom:auto';
    else symStyle='';
    const bg=s.symBgShape&&s.symBgShape!=='none'&&s.symBgOpacity>0;
    let wrapStyle='display:flex;align-items:center;justify-content:center;';
    if(bg){
      const bgc=s.symBgColor||'#c4954a';
      const bga=opacityHex(s.symBgOpacity||40);
      const bgd=gradDir(s.symBgDir||'right');
      const rds=s.symBgShape==='pill'?'999px':s.symBgShape==='rounded'?'10px':'4px';
      wrapStyle+=`background:linear-gradient(${bgd},${bgc}${bga} 0%,transparent ${s.symBgOpacity||40}%);border-radius:${rds};padding:8px 16px;`;
    }
    return `<div style="${wrapStyle}"><span style="font-size:${ss}px;color:${sc}${so};line-height:1;${symStyle}">${sy}</span></div>`;
  }
  if(s.type==='line'){
    const lc=s.lineColor||'#c4954a';
    const lt=s.lineThickness||1;
    const lo=s.lineOpacity||50;
    const loHex=opacityHex(lo);
    const loDir=gradDir(s.lineOpacityDir||'right');
    const sym=s.lineSymbol||'✦';
    const syc=s.lineSymbolColor||'#c4954a';
    const sySize=s.lineSymbolSize||18;
    const syOp=s.lineSymbolOpacity||80;
    const syHex=opacityHex(syOp);
    if(s.lineMode==='custom'){
      const parts=[];
      if(s.lineSymLeft){
        parts.push(`<span style="font-size:${sySize}px;color:${syc}${syHex}">${sym}</span>`);
      }
      if(s.lineBase){
        const baseStyle=`height:${lt}px;background:${lc}${loHex};opacity:${lo/100}`;
        if(s.lineSymRepeat){
          parts.push(`<div style="flex:1;display:flex;align-items:center"><div style="flex:1;${baseStyle}"></div><span style="font-size:${sySize}px;color:${syc}${syHex};flex-shrink:0">${sym}</span><div style="flex:1;${baseStyle}"></div></div>`);
        } else {
          parts.push(`<div style="flex:1;${baseStyle}"></div>`);
        }
      } else if(s.lineSymRepeat){
        parts.push(`<div style="flex:1;display:flex;align-items:center;gap:6px"><span style="font-size:${sySize}px;color:${syc}${syHex};flex-shrink:0">${sym}</span></div>`);
      }
      if(s.lineSymCenter&&!s.lineSymRepeat){
        parts.push(`<span style="font-size:${sySize}px;color:${syc}${syHex};flex-shrink:0">${sym}</span>`);
      }
      if(s.lineSymRight){
        parts.push(`<span style="font-size:${sySize}px;color:${syc}${syHex}">${sym}</span>`);
      }
      return `<div style="display:flex;align-items:center;gap:8px;direction:ltr;width:100%">${parts.join('')}</div>`;
    }
    let lineCSS;
    if(s.lineStyle==='double')lineCSS=`border-top:${lt}px solid ${lc};border-bottom:${lt}px solid ${lc};`;
    else if(s.lineStyle==='dotted')lineCSS=`background:repeating-linear-gradient(to right,${lc}${loHex} 0,${lc}${loHex} ${lt*2}px,transparent ${lt*2}px,transparent ${lt*4}px);height:${lt}px;`;
    else if(s.lineStyle==='dashed')lineCSS=`background:repeating-linear-gradient(to right,${lc}${loHex} 0,${lc}${loHex} ${lt*3}px,transparent ${lt*3}px,transparent ${lt*6}px);height:${lt}px;`;
    else lineCSS=`height:${lt}px;background:${lc}${loHex};opacity:${lo/100}`;
    return `<div style="width:100%;${lineCSS}"></div>`;
  }
  return '';
}
function buildLineHTML(s){return ornamentalToHTML(s);}
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
function truncateWords(text,n){const w=text.trim().split(/\s+/);return w.length<=n?text.trim():w.slice(0,n).join(' ')+'…';}

// ── BLOCKS ──
function addBlock(afterId, initialText=''){
  const b={id:nextBlockId++,styleId:7,text:initialText,children:[]};
  if(afterId===null)blocks.push(b);
  else{const i=blocks.findIndex(x=>x.id===afterId);blocks.splice(i+1,0,b);}
  renderBlocks();
  if(currentTab==='preview')renderPreview();
  setTimeout(()=>{const ta=document.querySelector(`#blk-${b.id} .block-textarea`);if(ta){autoResize(ta);ta.focus();}},20);
}
function deleteBlock(id){blocks=blocks.filter(b=>b.id!==id);renderBlocks();if(currentTab==='preview')renderPreview();}
function moveBlock(id,dir){
  const i=blocks.findIndex(b=>b.id===id),j=i+dir;
  if(j<0||j>=blocks.length)return;
  [blocks[i],blocks[j]]=[blocks[j],blocks[i]];
  renderBlocks();if(currentTab==='preview')renderPreview();
}
function renderBlocks(){
  const ev=document.getElementById('edit-view');
  var sy=ev.scrollTop;
  const wrap=document.getElementById('blocks-wrap');
  wrap.querySelectorAll('.block').forEach(el=>el.remove());
  blocks.forEach(b=>{
    const s=getStyle(b.styleId);
    const el=document.createElement('div');
    el.className='block';el.id=`blk-${b.id}`;
    const opts=styles.filter(st=>st.type!=='rich').map(st=>`<option value="${st.id}"${st.id===b.styleId?' selected':''}>${st.name}</option>`).join('');
    var layoutOpts=richStyles.map(function(rs){return'<option value="'+rs.id+'"'+(rs.id===b.richStyleId?' selected':'')+'>'+rs.name+'</option>';}).join('');
    el.innerHTML=`<div class="block-toolbar">
      ${b.isRich?`<select class="block-style-select" id="layout-sel-${b.id}">${layoutOpts}</select>`:`<select class="block-style-select">${opts}</select>`}
      ${b.isRich?`<button class="block-btn flow-toggle-btn" title="Toggle flow direction">${b.flowDir==='horizontal'?'⇔':'⇕'}</button>`:''}
      <button class="block-btn rich-toggle-btn${b.isRich?' on':''}" title="Toggle Rich container">⊞</button>
      <button class="block-btn">↑</button>
      <button class="block-btn">↓</button>
      <button class="block-btn ins">+</button>
      <button class="block-btn del">✕</button>
    </div>
    ${b.isRich?`<div class="rich-container-body"><div class="rich-child-wrap" id="rich-children-${b.id}" style="flex-direction:${b.flowDir==='horizontal'?'row':'column'};${b.flowDir==='horizontal'?'flex-wrap:wrap':''}"></div><button class="rich-add-child-btn">+ add inner block</button></div>`:(s.type==='line'?`<div class="line-block-preview" id="lprev-${b.id}" style="padding:16px 8px;display:flex;align-items:center;justify-content:center;direction:ltr">${ornamentalToHTML(s)}</div>`:`<textarea class="block-textarea" placeholder="اكتب هنا..." style="font-family:'${s.font}',serif;font-size:${Math.min(s.size,18)}px;line-height:${s.lineHeight};">${esc(b.text)}</textarea>`)}`;
    const mainSel=el.querySelector('.block-style-select');
    if(mainSel)mainSel.addEventListener('change',e=>{
      b.styleId=parseInt(e.target.value);
      renderBlocks();
      if(currentTab==='preview')renderPreview();
    });
    const richToggle=el.querySelector('.rich-toggle-btn');
    richToggle.addEventListener('click',()=>{
      b.isRich=!b.isRich;
      if(b.isRich){b.children=b.children||[];if(!b.flowDir)b.flowDir='vertical';if(!b.richStyleId&&richStyles.length)b.richStyleId=richStyles[0].id;b.text='';}
      else{b.children=[];b.richStyleId=null;}
      renderBlocks();
      if(currentTab==='preview')renderPreview();
    });
    var layoutSel=el.querySelector('#layout-sel-'+b.id);
    if(layoutSel) layoutSel.addEventListener('change',function(){b.richStyleId=this.value;if(currentTab==='preview')renderPreview();});
    var flowToggle=el.querySelector('.flow-toggle-btn');
    if(flowToggle) flowToggle.addEventListener('click',function(){
      b.flowDir=b.flowDir==='horizontal'?'vertical':'horizontal';
      var wrap=document.getElementById('rich-children-'+b.id);
      if(wrap){
        wrap.style.flexDirection=b.flowDir==='horizontal'?'row':'column';
        if(b.flowDir==='horizontal'){wrap.style.flexWrap='wrap';}else{wrap.style.flexWrap='';}
      }
      this.textContent=b.flowDir==='horizontal'?'⇔':'⇕';
      if(currentTab==='preview')renderPreview();
    });
    if(b.isRich){
      const addChildBtn=el.querySelector('.rich-add-child-btn');
      if(addChildBtn)addChildBtn.addEventListener('click',()=>{
        if(!b.children)b.children=[];
        b.children.push({id:nextInnerBlockId++,styleId:7,text:'',isRich:false,children:[]});
        renderRichChildren(b,el.querySelector(`#rich-children-${b.id}`),b.richStyleId);
        if(currentTab==='preview')renderPreview();
      });
      renderRichChildren(b,el.querySelector(`#rich-children-${b.id}`),b.richStyleId);
    } else {
      const ta=el.querySelector('.block-textarea');
      if(ta){
        ta.addEventListener('keydown',function(e){
          if(e.key==='Enter'&&e.ctrlKey){
            e.preventDefault();
            const pos=this.selectionStart;
            const before=this.value.substring(0,pos);
            const after=this.value.substring(pos);
            b.text=before;this.value=before;
            autoResize(this);
            if(currentTab==='preview')renderPreview();
            if(activeBlockId===b.id)renderBPS();
            addBlock(b.id,after);
          }
        });
        ta.addEventListener('input',function(){b.text=this.value;autoResize(this);if(currentTab==='preview')renderPreview();if(activeBlockId===b.id)renderBPS();});
        ta.addEventListener('focus',function(){autoResize(this);});
      }
    }
    const blockBtns=[...el.querySelectorAll('.block-btn')].filter(b=>!b.classList.contains('rich-toggle-btn'));
    const [upBtn,downBtn,insBtn,delBtn]=blockBtns;
    upBtn.addEventListener('click',()=>moveBlock(b.id,-1));
    downBtn.addEventListener('click',()=>moveBlock(b.id,1));
    insBtn.addEventListener('click',()=>addBlock(b.id));
    delBtn.addEventListener('click',()=>deleteBlock(b.id));
    if(b.isRich)el.classList.add('is-rich');
    el.addEventListener('mousedown',()=>setActiveBlock(b.id));
    wrap.appendChild(el);
    if(!b.isRich){const ta=el.querySelector('.block-textarea');if(ta)requestAnimationFrame(function(){autoResize(ta);});}
  });
  if(!activeBlockId && blocks.length) setActiveBlock(blocks[0].id);
  else if(activeBlockId) renderBPS();
  ev.scrollTop=sy;
  if(activeBlockId){
    var ab=document.getElementById('blk-'+activeBlockId);
    if(ab){
      var rect=ab.getBoundingClientRect();
      if(rect.top<0||rect.bottom>window.innerHeight) ab.scrollIntoView({block:'nearest',behavior:'instant'});
      var ta=ab.querySelector('.block-textarea');
      if(ta&&document.activeElement!==ta) setTimeout(function(){ta.focus();},10);
    }
  }
}

// ── RICH CHILDREN RENDERER ──
function renderRichChildren(b, wrap, parentRichStyleId){
  if(!wrap)return;
  wrap.innerHTML='';
  if(!b.children)b.children=[];
  const pid=parentRichStyleId||b.richStyleId;
  b.children.forEach((child,ci)=>{
    const s=getStyle(child.styleId);
    const cel=document.createElement('div');
    cel.className='block';
    var prs=getRichStyle(pid);
    var innerBg=prs&&prs.innerFillColor?prs.innerFillColor:'var(--bg2)';
    if(prs&&prs.innerFillDir&&prs.innerFillDir!=='none'){
      var dirs={right:'to left',left:'to right',top:'to bottom',bottom:'to top'};
      var end=prs.innerFillEnd||100;
      innerBg='linear-gradient('+(dirs[prs.innerFillDir]||'to bottom')+','+prs.innerFillColor+' 0%,transparent '+end+'%)';
    }
    var innerRadius=prs&&prs.innerShape==='pill'?'999px':prs&&prs.innerShape==='rounded'?'10px':prs&&prs.innerShape==='box'?'4px':'0';
    cel.style.cssText='margin:0;border-radius:'+innerRadius+';background:'+innerBg+(b.flowDir==='horizontal'?';flex:1;min-width:0':'');
    cel.id=`rich-child-${child.id}`;
    const richOpts=richStyles.map(rs=>`<option value="${rs.id}"${rs.id===child.richStyleId?' selected':''}>${rs.name}</option>`).join('');
    cel.innerHTML=`<div class="block-toolbar" style="padding:4px 8px">
      ${s.type==='line'?'<span style="font-size:9px;color:var(--text3);direction:ltr">LINE</span>':''}
      <button class="block-btn rich-toggle-btn${child.isRich?' on':''}" title="Toggle Rich">⊞</button>
      <button class="block-btn" style="width:22px;height:22px;font-size:11px">↑</button>
      <button class="block-btn" style="width:22px;height:22px;font-size:11px">↓</button>
      <button class="block-btn ins" style="width:22px;height:22px;font-size:11px">+</button>
      <button class="block-btn del" style="width:22px;height:22px;font-size:11px">✕</button>
    </div>
    ${child.isRich?`<div style="display:flex;align-items:center;gap:6px;padding:3px 8px;background:var(--bg4);border-bottom:1px solid var(--border);direction:ltr"><span style="font-size:9px;color:var(--accent)">⊞ rich:</span><select class="rich-style-select" style="font-size:9px">${richOpts}</select></div><div class="rich-container-body" style="padding:4px"><div class="rich-child-wrap" id="rich-children-${child.id}"></div><button class="rich-add-child-btn">+ add inner block</button></div>`:(s.type==='line'?`<div class="line-block-preview" id="rich-lprev-${child.id}" style="padding:10px 6px;display:flex;align-items:center;justify-content:center;direction:ltr">${ornamentalToHTML(s)}</div>`:`<textarea class="block-textarea" placeholder="اكتب هنا..." style="font-family:'${prs?prs.font:'Noto Nastaliq Urdu'}',serif;font-size:${prs?Math.min(prs.size||16,15):15}px;line-height:${prs?prs.lineHeight||2:2};min-height:40px">${esc(child.text||'')}</textarea>`)}`;
    const cRichToggle=cel.querySelector('.rich-toggle-btn');
    cRichToggle.addEventListener('click',()=>{child.isRich=!child.isRich;if(child.isRich){child.children=child.children||[];if(!child.richStyleId&&richStyles.length)child.richStyleId=richStyles[0].id;child.text='';}else{child.children=[];child.richStyleId=null;}renderRichChildren(b,wrap,pid);if(currentTab==='preview')renderPreview();});
    if(child.isRich){
      const rs=cel.querySelector('.rich-style-select');
      if(rs)rs.addEventListener('change',e=>{child.richStyleId=e.target.value;if(currentTab==='preview')renderPreview();});
      const acb=cel.querySelector('.rich-add-child-btn');
      if(acb)acb.addEventListener('click',()=>{if(!child.children)child.children=[];child.children.push({id:nextInnerBlockId++,styleId:7,text:'',isRich:false,children:[]});renderRichChildren(child,cel.querySelector(`#rich-children-${child.id}`),pid);if(currentTab==='preview')renderPreview();});
      renderRichChildren(child,cel.querySelector(`#rich-children-${child.id}`),pid);
    } else {
      const ta=cel.querySelector('.block-textarea');
      if(ta){ta.addEventListener('input',function(){child.text=this.value;autoResize(this);if(currentTab==='preview')renderPreview();});ta.addEventListener('focus',function(){autoResize(this);});requestAnimationFrame(function(){autoResize(ta);});}
    }
    const [upBtn,downBtn,insBtn,delBtn]=[...cel.querySelectorAll('.block-btn')].filter(x=>!x.classList.contains('rich-toggle-btn'));
    upBtn.addEventListener('click',()=>{if(ci>0){[b.children[ci-1],b.children[ci]]=[b.children[ci],b.children[ci-1]];renderRichChildren(b,wrap,pid);}});
    downBtn.addEventListener('click',()=>{if(ci<b.children.length-1){[b.children[ci],b.children[ci+1]]=[b.children[ci+1],b.children[ci]];renderRichChildren(b,wrap,pid);}});

function styleToCSS(s){
  if(s.type==='line'||s.type==='table'||s.type==='bullet')return '';
  let css=`font-family:'${s.font}',serif;font-size:calc(${s.size}px * var(--font-scale,1));color:${s.color};line-height:${s.lineHeight};direction:rtl;`;
  if(s.align==='justify'){css+='text-align:justify;text-justify:distribute;-webkit-text-justify:distribute;text-align-last:justify;word-spacing:-0.05em;';}else{css+=`text-align:${s.align};`;}
  if(s.bold)css+='font-weight:700;';
  if(s.italic)css+='font-style:italic;';
  if(s.underline)css+='text-decoration:underline;';
  if(s.type==='text'){
    const bs=[];
    if(s.borderTop)bs.push(`border-top:${s.borderTop}px solid ${s.borderColor}`);
    if(s.borderRight)bs.push(`border-right:${s.borderRight}px solid ${s.borderColor}`);
    if(s.borderBottom)bs.push(`border-bottom:${s.borderBottom}px solid ${s.borderColor}`);
    if(s.borderLeft)bs.push(`border-left:${s.borderLeft}px solid ${s.borderColor}`);
    if(bs.length)css+=bs.join(';')+';';
    if(s.margin) css+=`padding-left:${s.margin}%;padding-right:${s.margin}%;`;
    if(s.flyVertical) css+=`padding-top:${s.flyVertical}px;padding-bottom:${s.flyVertical}px;`;
    if(s.fillColor) css+='background-color:'+s.fillColor+';';
    if(s.borderEnabled) css+=`border:${s.borderWidth||2}px solid ${s.borderColor||'#c4954a'};border-radius:6px;`;
    if(s.frame==='gold'){css+='border:3px double #d4af37;outline:2px solid #b3891d;outline-offset:-6px;border-radius:6px;padding:12px;';}
    else if(s.frame==='double-gold'){css+='border:4px double #d4af37;outline:2px solid #b3891d;outline-offset:-8px;box-shadow:0 0 0 2px #d4af37 inset;border-radius:8px;padding:16px;';}
    if(s.ruled){
      var _lh=(s.size||16)*(s.lineHeight||2);var _rw=s.ruleWidth||3;var _rc=s.ruleColor||'#c4954a';var _roff=s.ruleOffset||0;var _rins=s.ruleInset||5;
      var _w=Math.max(1,100-_rins*2);
      var _ruledBg='repeating-linear-gradient(to bottom,transparent 0px,transparent '+(_lh-_rw)+'px,'+_rc+' '+(_lh-_rw)+'px,'+_rc+' '+_lh+'px)';
      css+='background-image:'+_ruledBg+';background-size:'+_w+'% calc(100% - '+_lh+'px);background-position:center calc(50% + '+_roff+'px);background-repeat:repeat-y;';
    }
    if(s.bgShape!=='none'&&s.bgAlpha>0&&!s.ruled){
      var radius=s.bgShape==='pill'?'999px':s.bgShape==='rounded'?'10px':'4px';
      css+='border-radius:'+radius+';';
      var a=Math.round(s.bgAlpha*2.55).toString(16).padStart(2,'0');
      var dirs={right:'to left',left:'to right',top:'to bottom',bottom:'to top'};
      css+='background-image:linear-gradient('+(dirs[s.bgDir]||'to bottom')+',transparent 0%,'+(s.bgColor||'#c4954a')+a+' '+(s.bgEnd||50)+'%);padding:8px 14px;';
    }
  }
  return css;
}

  if(bs.length)css+=bs.join(';')+';';

  if(rs.frame==='gold')css+='border:3px double #d4af37;outline:2px solid #b3891d;outline-offset:-6px;border-radius:6px;';
  else if(rs.frame==='double-gold')css+='border:4px double #d4af37;outline:2px solid #b3891d;outline-offset:-8px;box-shadow:0 0 0 2px #d4af37 inset;border-radius:8px;';
  if(rs.ruled){
    var _lh=(rs.size||16)*(rs.lineHeight||2);
    var _rw=rs.ruleWidth||1;
    var _rc=rs.ruleColor||'#c4954a';
    var _roff=rs.ruleOffset||0;

    var _w=Math.max(1,100-_rins*2);

    css+='background-image:'+_ruledBg+';background-size:'+_w+'% calc(100% - '+_lh+'px);background-position:center calc(50% + '+_roff+'px);background-repeat:repeat-y;';
  }

  css+='direction:rtl;';
  return css;
}

// ── HIERARCHY TREE BUILDER ──
function buildTree(blocks){
  var INDENT_STEP=30;
  var indentMap={};
  var count=1;
  styles.forEach(function(s){
    var isNode=s.node!==undefined?s.node:s.indented;
    if(s.indented&&isNode&&s.type==='text'){indentMap[s.id]=count*INDENT_STEP;count++;}
  });
  var root=[];
  var stack=[];
  root.orphans=[];
  root.flat=[];
  blocks.forEach(function(b){
    var s=getStyle(b.styleId);
    if(s.type==='text'&&!b.text.trim()&&!b.isRich)return;
    var isNode=s.node!==undefined?s.node:s.indented;
    if(s.indented && isNode){
      var indent=indentMap[s.id]||(INDENT_STEP*count++);
      while(stack.length&&stack[stack.length-1].indent>=indent) stack.pop();
      var node={node:b,indent:indent,style:s,content:[],children:[]};
      if(stack.length) stack[stack.length-1].children.push(node);
      else root.push(node);
      stack.push(node);
    } else if(s.indented){
      if(stack.length) stack[stack.length-1].content.push(b);
      else root.orphans.push(b);
    } else {
      root.flat.push(b);
    }
  });
  return root;
}

var previewBlockId=0;
function renderPreviewBlock(b,s,forNav){
  var id='pvb-'+(++previewBlockId);

  }
  var html='';

    html+='<div id="'+id+'" style="margin-bottom:8px;'+acc+'">';

    });
    html+='</div>';

    var thtml=renderTable(b.text,s);

  } else if(b.isRich){
    var rs=b.richStyleId?getRichStyle(b.richStyleId):null;
    var rcss=rs?richStyleToCSS(rs):'padding:10px;';
    var fd=b.flowDir==='horizontal'?'row':'column';
    html+='<div id="'+id+'" style="'+rcss+';margin-bottom:10px"><div style="display:flex;flex-direction:'+fd+';gap:8px;flex-wrap:'+(fd==='row'?'wrap':'nowrap')+'">'+renderRichChildrenHTML(b.children||[],b.flowDir==='horizontal',rs)+'</div></div>';
  } else if(s.type==='line'){
    html+='<div id="'+id+'" style="margin-bottom:10px">'+ornamentalToHTML(s)+'</div>';
  } else if(s.type==='symbol'){
    html+='<div id="'+id+'" style="margin-bottom:10px;display:flex;align-items:center;justify-content:center;direction:ltr">'+ornamentalToHTML(s)+'</div>';
  } else {
    var headerHtml='';
    var blockText=b.text||'';
    if(s.headerEnabled){
      var hLines=blockText.split('\n');
      var hText=hLines.length>1?hLines.shift():'';
      if(hText){
        var hc=s.headerColor||'#c4954a';
        headerHtml='<div style="background:'+hc+';color:#fff;padding:8px 14px;font-weight:700;border-radius:6px 6px 0 0;text-align:right;direction:rtl">'+esc(hText)+'</div>';
      }
      blockText=hLines.join('\n');
    }
    if(s.refStyle){
      var lines=blockText.split('\n');
      var refText=lines.length>1?lines.pop():'';
      var mainText=lines.join('\n');
      var rc=s.refColor||'#c4954a';
      var ra=Math.round(30*2.55).toString(16).padStart(2,'0');
      var topHtml='<div style="border-radius:10px 10px 0 0;padding:14px;background:'+rc+ra+';font-size:inherit;line-height:inherit">'+esc(mainText).replace(/\n/g,'<br>')+'</div>';
      var bottomHtml='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;direction:rtl"><div style="flex:1;height:1px;background:'+rc+'"></div><span style="background:'+rc+';color:#fff;border-radius:999px;padding:6px 14px;font-size:12px;white-space:nowrap">'+esc(refText)+'</span></div>';
      txt='<div style="border:1px solid '+rc+'66;border-radius:12px;overflow:hidden;position:relative">'+topHtml+bottomHtml+'</div>';
    } else {
      txt=blockText.replace(/\n/g,'<br>');
    }
    if(headerHtml) txt=headerHtml+'<div style="padding:12px 14px">'+txt+'</div>';
    html+='<div id="'+id+'" style="'+styleToCSS(s)+';margin-bottom:10px">'+txt+'</div>';
  }
  return {html:html,nav:nav};
}
function renderPreview(){
  const content=document.getElementById('pv-content');
  const navList=document.getElementById('pv-nav-list');
  if(!blocks.length||blocks.every(b=>!b.text.trim())){
    content.innerHTML='<p style="color:#bbb;font-family:IBM Plex Mono,monospace;font-size:11px;text-align:center;padding:80px 0;direction:ltr">no content yet</p>';
    navList.innerHTML='';return;
  }
  // Scan indent levels
  previewBlockId=0;
  var navParts=[];
  var contentHtml='';
  var btn=document.getElementById('tree-toggle');
  if(btn) btn.textContent=treeMode?'🌳 Tree':'📄 Flat';
  if(treeMode){
    var tree=buildTree(blocks);
    function renderContentBlocks(blocksArr){
      var h='';
      blocksArr.forEach(function(cb){
        var cs=getStyle(cb.styleId);
        var r=renderPreviewBlock(cb,cs,true);
        h+=r.html;
        if(r.nav) navParts.push(r.nav);
      });
      return h;
    }
    function renderNode(node,parentIndent){
      parentIndent=parentIndent||0;
      var indent=node.indent||0;
      var step=Math.max(0,indent-parentIndent);
      var s=node.style;
      var railHtml='';
      if(step>0){
        railHtml='<div style="position:absolute;right:0;top:0;bottom:0;width:'+step+'px;pointer-events:none;z-index:1">'+
          '<div style="position:absolute;right:0;top:0;bottom:0;width:'+(s.lineWidth||1)+'px;border-right:'+(s.lineWidth||1)+'px '+(s.lineStyle||'solid')+' '+(s.lineColor||'#c4954a')+';"></div>'+
        '</div>';
      }
      var hasChildren=node.children&&node.children.length>0;
      var hasText=node.node&&node.node.text&&node.node.text.trim();
      var h='<div class="h-node" style="position:relative">'+railHtml;
      if(hasText){
        var hid='pvb-'+(++previewBlockId);
        if(s.tocInclude){
          if(s.tocStyle==='TOCStyle4') navParts.push({isPill:true,target:hid,label:truncateWords(node.node.text,3)});
          else{var cls=s.tocStyle==='TOCStyle2'?'toc-s2':s.tocStyle==='TOCStyle3'?'toc-s3':'toc-s1';navParts.push({isPill:false,html:'<div class="'+cls+'" data-target="'+hid+'">'+esc(node.node.text.substring(0,38))+'</div>'});}
        }
        h+='<div class="h-heading" id="'+hid+'" style="padding-right:'+step+'px">'+
          '<div style="display:flex;align-items:center;gap:4px;direction:rtl">'+
            '<span class="h-arrow">▼</span>'+
            '<span style="flex:1;text-align:right;font-family:\''+s.font+'\',serif;font-size:calc('+s.size+'px * var(--font-scale,1));color:'+s.color+';line-height:'+s.lineHeight+';'+(s.bold?'font-weight:700':'')+'">'+esc(node.node.text)+'</span>'+
          '</div>'+
        '</div>';
      }
      h+='<div class="h-content" style="padding-right:'+indent+'px">'+renderContentBlocks(node.content)+'</div>';
      if(hasChildren){
        h+='<div class="h-children">';
        node.children.forEach(function(c){h+=renderNode(c,indent);});
        h+='</div>';
      }
      h+='</div>';
      return h;
    }
    tree.forEach(function(n){contentHtml+=renderNode(n,0);});
    if(tree.orphans.length) contentHtml='<div class="h-content" style="padding-right:20px">'+renderContentBlocks(tree.orphans)+'</div>'+contentHtml;
    if(tree.flat.length) contentHtml=renderContentBlocks(tree.flat)+contentHtml;
  } else {
    blocks.forEach(function(b){
      if(!b.text.trim()&&!b.isRich)return;
      var s=getStyle(b.styleId);
      var r=renderPreviewBlock(b,s,true);
      contentHtml+=r.html;
      if(r.nav) navParts.push(r.nav);
    });
  }
  if(currentTab==='preview') previewScrollY=content.scrollTop;
  content.innerHTML='<div style="position:relative;min-height:100%">'+contentHtml+'</div>';
  if(previewScrollY) requestAnimationFrame(function(){content.scrollTop=Math.min(previewScrollY,content.scrollHeight);});
  if(!content._arrowInit){content._arrowInit=true;content.addEventListener('click',function(e){var a=e.target.closest('.h-arrow');if(a)toggleCollapse(a);});}
  initPins(content);
  // Build nav
  let navHtml='';let i=0;
  while(i<navParts.length){
    if(navParts[i].isPill){
      navHtml+='<div class="toc-s4-wrap">';
      while(i<navParts.length&&navParts[i].isPill){navHtml+='<span class="toc-s4" data-target="'+navParts[i].target+'">'+esc(navParts[i].label)+'</span>';i++;}
      navHtml+='</div>';
    } else {navHtml+=navParts[i].html;i++;}
  }
  navList.innerHTML=navHtml||'<p style="color:#ccc;font-size:10px;font-family:IBM Plex Mono,monospace;padding:4px">No TOC items</p>';
  navList.querySelectorAll('[data-target]').forEach(function(el){
    el.addEventListener('click',function(){var t=document.getElementById(el.dataset.target);if(t)t.scrollIntoView({behavior:'smooth',block:'start'});});
  });
  const q=document.getElementById('pv-search-input').value;
  if(searchOpen&&q.trim())highlightContent(q);
}

function toggleCollapse(el){
  var node=el.target?el.target.closest('.h-arrow'):el;
  if(!node) return;
  var nd=node.closest('.h-node');

  var ch=nd.querySelector('.h-children');

  if(!ch&&!ct) return;
  if(ch) ch.classList.toggle('collapsed');

  node.textContent=ch&&!ch.classList.contains('collapsed')?'▼':'▶';
}

function renderPinPanel(container){

function dropPin(container){
  if(!container)return;
  var pins=JSON.parse(localStorage.getItem('kb_pins')||'[]');

  var sy=container.scrollTop||0;

function goToPin(idx){

  var container=document.getElementById('pv-content')||document.getElementById('content');

function initPins(container,storageKey){

  container.addEventListener('mousedown',function(){timer=setTimeout(function(){dropPin(container);},3000);});

}

function highlightContent(q){
  function walk(node){
    if(node.nodeType===3){
      const idx=node.textContent.indexOf(q);
      if(idx>=0){
        const mark=document.createElement('mark');mark.className='sh';
        mark.textContent=node.textContent.substring(idx,idx+q.length);
        const frag=document.createDocumentFragment();
        frag.append(document.createTextNode(node.textContent.substring(0,idx)),mark,document.createTextNode(node.textContent.substring(idx+q.length)));
        node.parentNode.replaceChild(frag,node);
      }
    } else if(node.nodeType===1&&node.childNodes&&node.nodeName!=='SCRIPT'){
      Array.from(node.childNodes).forEach(walk);
    }
  }
  walk(document.getElementById('pv-content'));
}

function doSearch(q){
  renderPreview();
  const resultsEl=document.getElementById('pv-search-results');
  const countEl=document.getElementById('pv-search-count');
  if(!q.trim()){countEl.textContent='';resultsEl.innerHTML='';return;}
  highlightContent(q);

  const results=[];
  let lastTocLabel=null;
  blocks.forEach(b=>{
    if(!b.text.trim())return;
    const s=getStyle(b.styleId);
    const aid=`pvb-${b.id}`;
    if(s.tocInclude){lastTocLabel=b.text.substring(0,38);}
    let pos=0;
    while(results.length<25){
      const idx=b.text.indexOf(q,pos);if(idx===-1)break;
      const start=Math.max(0,idx-18),end=Math.min(b.text.length,idx+q.length+18);
      const snippet=(start>0?'…':'')+esc(b.text.substring(start,idx))+`<mark>${esc(b.text.substring(idx,idx+q.length))}</mark>`+esc(b.text.substring(idx+q.length,end))+(end<b.text.length?'…':'');
      results.push({snippet,parentLabel:lastTocLabel,blockTarget:aid});
      pos=idx+q.length;
    }
  });

  countEl.textContent=results.length>0?`${results.length} نتيجة`:'لا نتائج';

  if(!results.length){
    resultsEl.innerHTML=`<div class="sr-empty">لا توجد نتائج</div>`;
    return;
  }
  resultsEl.innerHTML=results.map(r=>`
    <div class="sr-item" data-target="${r.blockTarget}">
      ${r.parentLabel?`<span class="sr-parent">↑ ${esc(r.parentLabel)}</span>`:''}
      <span class="sr-snippet">${r.snippet}</span>
    </div>`).join('');
  resultsEl.querySelectorAll('.sr-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const el=document.getElementById(item.dataset.target);
      if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
      // save clicked result to recents
      const snippet=item.querySelector('.sr-snippet')?.textContent?.trim()||'';
      if(snippet){
        recentSearches=recentSearches.filter(r=>r.target!==item.dataset.target||r.snippet!==snippet);
        recentSearches.unshift({snippet:snippet,target:item.dataset.target});
        if(recentSearches.length>10)recentSearches=recentSearches.slice(0,10);
        recentExpanded=false;
        renderRecentSearches();
      }
    });
  });
}

function renderRecentSearches(){
  const el=document.getElementById('pv-nav-recent-list');
  const wrap=document.getElementById('pv-nav-recent');
  if(!recentSearches.length){wrap.style.display='none';return;}
  wrap.style.display='';
  const visible=recentExpanded?recentSearches:recentSearches.slice(0,5);
  const showMoreBtn=recentSearches.length>5?`<div class="recent-more" id="recent-more-btn">${recentExpanded?'show less':'show more ('+recentSearches.length+')'}</div>`:'';
  el.innerHTML=visible.map((r,i)=>`<div class="recent-item" data-target="${esc(r.target)}" data-i="${i}">${esc(r.snippet)}</div>`).join('')+showMoreBtn;
  el.querySelectorAll('.recent-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const t=document.getElementById(item.dataset.target);
      if(t)t.scrollIntoView({behavior:'smooth',block:'center'});
    });
  });
  const moreBtn=document.getElementById('recent-more-btn');
  if(moreBtn)moreBtn.addEventListener('click',()=>{recentExpanded=!recentExpanded;renderRecentSearches();});
}

var _rootHandle=null;
var _dbPromise=null;

function openHandleDB(){
  _dbPromise=new Promise(function(resolve){
    try {
      var req=indexedDB.open('KitabHandles',1);
      req.onupgradeneeded=function(e){
        var db=e.target.result;
        if(!db.objectStoreNames.contains('handles')) db.createObjectStore('handles');
      };
      req.onsuccess=function(e){
        var db=e.target.result;
        try {
          var tx=db.transaction('handles','readonly');
          var store=tx.objectStore('handles');
          var getReq=store.get('root');
          getReq.onsuccess=function(){
            if(getReq.result) _rootHandle=getReq.result;
            resolve();
          };
          getReq.onerror=function(){resolve();};
        } catch(e){resolve();}
      };
      req.onerror=function(){resolve();};
    } catch(e){resolve();}
  });
}

function saveRootHandle(handle){
  if(!_dbPromise) return;
  _dbPromise.then(function(){
    try {
      var req=indexedDB.open('KitabHandles',1);
      req.onsuccess=function(e){
        var db=e.target.result;
        var tx=db.transaction('handles','readwrite');
        tx.objectStore('handles').put(handle,'root');
      };
    } catch(e){}
  });
}

async function getBookDir(bookName){
  if(_dbPromise) await _dbPromise;
  if(!_rootHandle){
    if(window.showDirectoryPicker){
      try {
        alert('Select your project root folder (where "books/" will be created). Only needed once.');
        _rootHandle=await window.showDirectoryPicker({mode:'readwrite'});
        saveRootHandle(_rootHandle);
      } catch(e){
        if(e.name!=='AbortError') alert('Could not access folder: '+e.message);
        return null;
      }
    } else {
      return null;
    }
  }
  if(_rootHandle){
    try {
      var booksDir=await _rootHandle.getDirectoryHandle('books',{create:true});
      return await booksDir.getDirectoryHandle(bookName,{create:true});
    } catch(e){ return null; }
  }
  return null;
}

function downloadFiles(files){
  for(var i=0;i<files.length;i++){
    var f=files[i], blob=f.blob||new Blob([f.text||''],{type:f.type||'application/octet-stream'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=f.name;a.click();
    URL.revokeObjectURL(a.href);
  }
}

async function writeToDir(bookDir, files){
  if(!bookDir){downloadFiles(files);return;}
  var saved=0;
  for(var i=0;i<files.length;i++){
    try {
      var f=files[i], fh=await bookDir.getFileHandle(f.name,{create:true});
      var w=await fh.createWritable();
      if(f.blob) await w.write(f.blob); else await w.write(f.text||'');
      await w.close();
      saved++;
    } catch(e){
      console.error('Failed to save '+files[i].name+': '+e.message);
    }
  }
  if(saved>0) alert('Saved '+saved+' file(s) to folder.');
  else alert('Could not save files. Try clicking "Set Folder" again.');
}

function renderPresentationOnCanvas(coverCanvas, callback){
  var mockupSrc=null;
  if(bookMeta && bookMeta.cover && bookMeta.cover.customMockupData) mockupSrc=bookMeta.cover.customMockupData;
  var img=new Image();
  var loaded=false;
  img.onload=function(){
    loaded=true;
    var pw=img.naturalWidth, ph=img.naturalHeight;
    var pCanvas=document.createElement('canvas');
    pCanvas.width=pw; pCanvas.height=ph;
    var pCtx=pCanvas.getContext('2d');
    pCtx.drawImage(img,0,0,pw,ph);
    pCtx.imageSmoothingEnabled=true;
    pCtx.imageSmoothingQuality='high';
    var mr=(bookMeta&&bookMeta.cover&&bookMeta.cover.mockupRect)||{x1:476,y1:120,x2:775,y2:599};
    var cx=mr.x1, cy=mr.y1, cw=mr.x2-mr.x1, ch=mr.y2-mr.y1;
    pCtx.globalCompositeOperation='multiply';
    pCtx.drawImage(coverCanvas,0,0,coverCanvas.width,coverCanvas.height,cx,cy,cw,ch);
    pCtx.globalCompositeOperation='source-over';
    callback(pCanvas);
  };
  img.onerror=function(){
    var pCanvas=document.createElement('canvas');
    pCanvas.width=coverCanvas.width; pCanvas.height=coverCanvas.height;
    var pCtx=pCanvas.getContext('2d');
    pCtx.fillStyle='#f4f1eb';
    pCtx.fillRect(0,0,pCanvas.width,pCanvas.height);
    pCtx.strokeStyle='#c4954a';
    pCtx.lineWidth=Math.round(coverCanvas.width*0.008);
    var m=Math.round(coverCanvas.width*0.06);
    pCtx.strokeRect(m,m,pCanvas.width-m*2,pCanvas.height-m*2);
    pCtx.globalCompositeOperation='multiply';
    pCtx.drawImage(coverCanvas,Math.round(coverCanvas.width*0.1),Math.round(coverCanvas.height*0.1),Math.round(coverCanvas.width*0.8),Math.round(coverCanvas.height*0.8));
    pCtx.globalCompositeOperation='source-over';
    callback(pCanvas);
  };
  if(mockupSrc) img.src=mockupSrc;
  else img.src='assets/bookmockup-1.png';
  setTimeout(function(){if(!loaded) img.src='';},2000);
}

  getBookDir(fn).then(function(bookDir){
    exportCoverImage(function(blob,canvas){
      if(blob) files.push({name:fn+'-cover.jpg',blob:blob});
      if(bookMeta.cover.generatePresentation!==false){
        try {
          renderPresentationOnCanvas(canvas,function(pCanvas){
              pCanvas.toBlob(function(pBlob){
                if(pBlob) files.push({name:fn+'-presentation.jpg',blob:pBlob});
                if(bookDir) writeToDir(bookDir,files); else downloadFiles(files);
              },'image/jpeg',0.95);
            });
          } catch(e){
            if(bookDir) writeToDir(bookDir,files); else downloadFiles(files);
          }
        } else {
          if(bookDir) writeToDir(bookDir,files); else downloadFiles(files);
        }
      });
    });
  }

  document.getElementById('cv-bgtype').value=c.bgType||'solid';
  document.getElementById('cv-bgc1').value=c.bgColor1||'#1a3a2a';
  document.getElementById('cv-bgc2').value=c.bgColor2||'#2a5a3a';
  document.getElementById('cv-graddir').value=c.gradientDir||'135deg';
  document.getElementById('cv-border-style').value=c.borderStyle||'solid';
  document.getElementById('cv-border-size').value=c.borderSize||4;
  document.getElementById('cv-border-color').value=c.borderColor||'#c4954a';
  document.getElementById('cv-border-offset').value=c.borderOffset||20;
  document.getElementById('cv-border-offset-val').textContent=(c.borderOffset||20)+'px';
  document.getElementById('cv-blend').value=c.patternBlend||'multiply';
  document.getElementById('cv-pattern-none').checked=!c.patternId;
  document.getElementById('cv-gen-pres').checked=c.generatePresentation!==false;
  var mr=c.mockupRect||{x1:476,y1:120,x2:775,y2:599};
  document.getElementById('cv-mock-coords').value=(mr.x1||'')+','+(mr.y1||'')+','+(mr.x2||'')+','+(mr.y2||'');
  toggleBgType();
  togglePattern();
  renderPatternGrid();
  renderElementsList();
  wireCoverEvents();
  wireMockupBrowse();
  if(c.customMockupData){
    document.getElementById('cv-mockup-filename').textContent='Custom mockup loaded';
    document.getElementById('cv-mockup-preview').src=c.customMockupData;
    document.getElementById('cv-mockup-thumb').style.display='block';
    document.getElementById('cv-mockup-clear').style.display='inline-block';
  }
}

function wireMockupBrowse(){
  var inp=document.getElementById('cv-mockup-file');
  inp.onchange=function(){
    var file=this.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(e){
      var dataUrl=e.target.result;
      if(cvTempMeta) cvTempMeta.cover.customMockupData=dataUrl;
      document.getElementById('cv-mockup-filename').textContent=file.name;
      document.getElementById('cv-mockup-preview').src=dataUrl;
      document.getElementById('cv-mockup-thumb').style.display='block';
      document.getElementById('cv-mockup-clear').style.display='inline-block';
      renderCoverPreview();
    };
    reader.readAsDataURL(file);
  };
}

function clearCustomMockup(){
  if(cvTempMeta) cvTempMeta.cover.customMockupData=null;
  document.getElementById('cv-mockup-filename').textContent='';
  document.getElementById('cv-mockup-thumb').style.display='none';
  document.getElementById('cv-mockup-clear').style.display='none';
  if(bookMeta) bookMeta.cover.customMockupData=null;
}

function toggleBgType(){
  const t=document.getElementById('cv-bgtype').value;
  document.getElementById('cv-bgcolor2-row').style.display=t==='gradient'?'flex':'none';
  document.getElementById('cv-graddir-row').style.display=t==='gradient'?'flex':'none';
}

function togglePattern(){
  const off=document.getElementById('cv-pattern-none').checked;
  document.getElementById('cv-pattern-body').style.display=off?'none':'block';
}

function wireCoverEvents(){
  ['cv-author','cv-topic','cv-summary','cv-preface'].forEach(id=>{
    document.getElementById(id).addEventListener('input',()=>{gatherCoverUI();renderCoverPreview();});
  });
  document.getElementById('cv-bgtype').addEventListener('change',()=>{toggleBgType();gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-bgc1').addEventListener('input',()=>{gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-bgc2').addEventListener('input',()=>{gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-graddir').addEventListener('change',()=>{gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-pattern-none').addEventListener('change',()=>{togglePattern();gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-blend').addEventListener('change',()=>{gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-border-style').addEventListener('change',()=>{gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-border-size').addEventListener('input',()=>{gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-border-color').addEventListener('input',()=>{gatherCoverUI();renderCoverPreview();});
  document.getElementById('cv-border-offset').addEventListener('input',function(){gatherCoverUI();document.getElementById('cv-border-offset-val').textContent=this.value+'px';renderCoverPreview();});
  document.getElementById('cv-gen-pres').addEventListener('change',()=>{gatherCoverUI();});
  document.getElementById('cv-mock-coords').addEventListener('change',()=>{gatherCoverUI();});
}

function gatherCoverUI(){
  if(!cvTempMeta) return;
  const c=cvTempMeta.cover;
  cvTempMeta.author=document.getElementById('cv-author').value;
  cvTempMeta.topic=document.getElementById('cv-topic').value;
  cvTempMeta.summary=document.getElementById('cv-summary').value;
  cvTempMeta.preface=document.getElementById('cv-preface').value;
  c.bgType=document.getElementById('cv-bgtype').value;
  c.bgColor1=document.getElementById('cv-bgc1').value;
  c.bgColor2=document.getElementById('cv-bgc2').value;
  c.gradientDir=document.getElementById('cv-graddir').value;
  c.borderStyle=document.getElementById('cv-border-style').value;
  c.borderSize=parseInt(document.getElementById('cv-border-size').value)||0;
  c.borderColor=document.getElementById('cv-border-color').value;
  c.borderOffset=parseInt(document.getElementById('cv-border-offset').value)||0;
  c.patternBlend=document.getElementById('cv-blend').value;
  c.generatePresentation=document.getElementById('cv-gen-pres').checked;
  c.mockupRect=(function(){
    var v=document.getElementById('cv-mock-coords').value.trim().replace(/،/g,',');
    if(!v) return c.mockupRect||{x1:476,y1:120,x2:775,y2:599};
    var p=v.split(',').map(function(s){return parseInt(s.trim());});
    if(p.length<4||p.some(function(n){return isNaN(n);})) return c.mockupRect||{x1:476,y1:120,x2:775,y2:599};
    return {x1:p[0],y1:p[1],x2:p[2],y2:p[3]};
  })();
  if(document.getElementById('cv-pattern-none').checked) c.patternId=null;
  else c.patternId=document.getElementById('cv-pattern-select').value;
}

function renderPatternGrid(){
  const grid=document.getElementById('cv-pattern-grid');
  const sel=document.getElementById('cv-pattern-select');
  grid.innerHTML=''; sel.innerHTML='<option value="">Select pattern</option>';
  COVER_PATTERNS.forEach(p=>{
    const active=cvTempMeta.cover.patternId===p.id;
    const d=document.createElement('div');
    d.className='cv-pattern-item'+(active?' active':'');
    d.dataset.pid=p.id;
    d.innerHTML=p.svg+'<span>'+esc(p.name)+'</span>';
    d.addEventListener('click',function(){
      grid.querySelectorAll('.cv-pattern-item').forEach(x=>x.classList.remove('active'));
      this.classList.add('active');
      sel.value=p.id;
      gatherCoverUI();renderCoverPreview();
    });
    grid.appendChild(d);
    const o=document.createElement('option');
    o.value=p.id; o.textContent=p.name; if(active)o.selected=true;
    sel.appendChild(o);
  });
  sel.addEventListener('change',function(){
    grid.querySelectorAll('.cv-pattern-item').forEach(x=>x.classList.toggle('active',x.dataset.pid===this.value));
    gatherCoverUI();renderCoverPreview();
  });
}

function renderElementsList(){
  const list=document.getElementById('cv-elem-list');
  const els=cvTempMeta.cover.elements||[];
  list.innerHTML=els.map((e,i)=>{
    const icons={title:'T',author:'A',text:'Tx',line:'—',symbol:'✦'};
    return '<div class="cv-elem-item" data-idx="'+i+'">'+
      '<span class="cv-elem-icon">'+(icons[e.type]||'?')+'</span>'+
      '<span class="cv-elem-name">'+esc(e.text||e.type||'')+'</span>'+
      '<button class="cv-elem-up" data-idx="'+i+'">▲</button>'+
      '<button class="cv-elem-down" data-idx="'+i+'">▼</button>'+
      '<button class="cv-elem-del" data-idx="'+i+'">✕</button>'+
    '</div>';
  }).join('');
  list.querySelectorAll('.cv-elem-item').forEach(el=>{
    el.addEventListener('click',function(){openCoverElementEditor(parseInt(this.dataset.idx));});
  });
  list.querySelectorAll('.cv-elem-up').forEach(btn=>{
    btn.addEventListener('click',function(e){e.stopPropagation();moveCoverElement(parseInt(this.dataset.idx),-1);});
  });
  list.querySelectorAll('.cv-elem-down').forEach(btn=>{
    btn.addEventListener('click',function(e){e.stopPropagation();moveCoverElement(parseInt(this.dataset.idx),1);});
  });
  list.querySelectorAll('.cv-elem-del').forEach(btn=>{
    btn.addEventListener('click',function(e){e.stopPropagation();deleteCoverElement(parseInt(this.dataset.idx));});
  });
}

function addCoverElement(type){
  var el={type,text:'',font:'Noto Nastaliq Urdu',size:24,bold:false,italic:false,underline:false,color:'#ffffff',align:'center',shape:'none',accent:'center',lineHeight:1.6,posX:50,posY:50,shapeBgColor:'#c4954a'};
  if(type==='title'){el.text='Title';el.size=42;el.bold=true;el.color='#ffffff';el.shapeBgColor='#c4954a';}
  else if(type==='author'){el.text='Author';el.size=20;el.italic=true;el.color='#e0d5c0';el.shapeBgColor='#c4954a';}
  else if(type==='text'){el.text='Text';el.size=16;el.color='#ffffff';el.shapeBgColor='#c4954a';}
  else if(type==='line'){el={type:'line',lineMode:'preset',lineStyle:'solid',lineThickness:2,lineColor:'#c4954a',lineOpacity:80,posX:50,posY:50};}
  else if(type==='symbol'){el={type:'symbol',symChar:'✦',symColor:'#c4954a',symSize:28,symOpacity:80,posX:50,posY:50};}
  cvTempMeta.cover.elements.push(el);
  renderElementsList();
  renderCoverPreview();
}

function moveCoverElement(idx,dir){
  const els=cvTempMeta.cover.elements;
  const ni=idx+dir;
  if(ni<0||ni>=els.length)return;
  [els[idx],els[ni]]=[els[ni],els[idx]];
  renderElementsList();
  renderCoverPreview();
}
function deleteCoverElement(idx){
  cvTempMeta.cover.elements.splice(idx,1);
  renderElementsList();
  document.getElementById('cv-elem-settings-area').innerHTML='';

  document.getElementById('ce-align').addEventListener('change',function(){cvTempMeta.cover.elements[cvEditingIdx].align=this.value;renderCoverPreview();});
   document.getElementById('ce-shape').addEventListener('change',function(){cvTempMeta.cover.elements[cvEditingIdx].shape=this.value;renderCoverPreview();});

  document.getElementById('ce-text-posy').addEventListener('input',function(){cvTempMeta.cover.elements[cvEditingIdx].posY=parseInt(this.value);document.getElementById('ce-text-posy-val').textContent=this.value+'%';renderCoverPreview();});
