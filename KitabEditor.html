function renderCoverPreview(){
  const wrap=document.getElementById('cover-canvas-wrap');
  if(!cvTempMeta||!cvTempMeta.cover){wrap.innerHTML='<div style="color:var(--text3);font-size:12px;padding:40px">No cover configured</div>';return;}
  const c=cvTempMeta.cover;
  const dims=getPageDims();
  const pw=c.width||dims.w;
  const ph=c.height||dims.h;
  var pW=wrap.parentElement.clientWidth;
  const maxW= pW>0 ? Math.min(pW-40,500) : 300;
  const aspect=ph/pw;
  const w=maxW, h=w*aspect;
  wrap.style.width=w+'px'; wrap.style.height=h+'px';
  // Build cover HTML
  let bgStyle='';
  if(c.bgType==='gradient') bgStyle='background:linear-gradient('+c.gradientDir+','+c.bgColor1+','+c.bgColor2+')';
  else bgStyle='background:'+c.bgColor1;
  let patHtml='';
  if(c.patternId){
    const pat=COVER_PATTERNS.find(p=>p.id===c.patternId);
    if(pat) patHtml='<div style="position:absolute;inset:0;mix-blend-mode:'+c.patternBlend+';color:'+c.bgColor1+'">'+
      '<div style="width:100%;height:100%;background-image:url(\'data:image/svg+xml,'+encodeURIComponent(pat.svg.replace('currentColor',c.bgColor1))+
      '\');background-repeat:repeat;background-size:40px 40px;opacity:0.5"></div></div>';
  }
  var bo=c.borderOffset||0;
  var bs=c.borderSize||0;
  var bcol=c.borderColor||'#c4954a';
  // Build element sections
  var topEls='', midEls='', botEls='';
  (c.elements||[]).forEach(function(e){
    var acc=e.accent||'center'; var html='';
    if(e.type==='line'){
      const lc=e.lineColor||'#c4954a'; const lt=e.lineThickness||2; const lo=e.lineOpacity||80;
      let lineCss;
      if(e.lineStyle==='double')lineCss='border-top:'+lt+'px solid '+lc+';border-bottom:'+lt+'px solid '+lc+';height:'+(lt*2)+'px';
      else if(e.lineStyle==='dotted')lineCss='background:repeating-linear-gradient(to right,'+lc+' 0,'+lc+' '+(lt*2)+'px,transparent '+(lt*2)+'px,transparent '+(lt*4)+'px);height:'+lt+'px';
      else lineCss='height:'+lt+'px;background:'+lc+';opacity:'+(lo/100);
      html='<div style="margin:0 auto;width:60%;'+lineCss+'"></div>';
    } else if(e.type==='symbol'){
      const so=e.symOpacity||80;
      html='<div style="text-align:center;font-size:'+(e.symSize||28)+'px;color:'+(e.symColor||'#c4954a')+';opacity:'+(so/100)+';line-height:1">'+(e.symChar||'✦')+'</div>';
    } else {
      let txt=e.text||'';
      let st='font-family:\''+(e.font||'Noto Nastaliq Urdu')+'\',serif;font-size:'+(e.size||20)+'px;color:'+(e.color||'#ffffff')+';text-align:'+(e.align||'center')+';line-height:'+(e.lineHeight||1.4)+';direction:rtl;';
      if(e.bold)st+='font-weight:700;'; if(e.italic)st+='font-style:italic;'; if(e.underline)st+='text-decoration:underline;';
      let wrapDiv='';
      if(e.shape&&e.shape!=='none'){
        const r=e.shape==='pill'?'999px':e.shape==='round'?'12px':'4px';
        const ba=e.shapeBgAlpha||0; const bc=e.shapeBgColor||e.color||'#ffffff';
        wrapDiv='display:inline-block;padding:6px 18px;border-radius:'+r+';background:'+bc+Math.round(ba*2.55).toString(16).padStart(2,'0')+';';
      }
      let al=e.align||'center'; let just=al==='center'?'center':al==='right'?'flex-start':'flex-end';
      var allStyle=wrapDiv?wrapDiv+st:st;
      html='<div style="width:100%;display:flex;justify-content:'+just+'"><span style="'+allStyle+'">'+esc(txt)+'</span></div>';
    }
    if(e.posX!=null||e.posY!=null) midEls+='<div style="position:absolute;left:'+(e.posX!=null?e.posX:50)+'%;top:'+(e.posY!=null?e.posY:50)+'%;transform:translate(-50%,-50%);width:80%">'+html+'</div>';
    else if(acc==='top') topEls+='<div style="width:100%">'+html+'</div>';
    else if(acc==='bottom') botEls+='<div style="width:100%">'+html+'</div>';
    else midEls+='<div style="width:100%">'+html+'</div>';
  });
  let borderHtml='';
  if(bs>0&&c.borderStyle==='goldframe'){
    borderHtml='<div style="position:absolute;top:'+bo+'px;left:'+bo+'px;right:'+bo+'px;bottom:'+bo+'px;pointer-events:none;box-sizing:border-box;border:'+bs+'px solid '+bcol+';border-radius:4px;box-shadow:0 0 0 '+Math.max(bs,2)+'px '+bcol+',0 0 0 '+Math.max(bs*2,4)+'px '+bcol+';opacity:0.6"></div>';
  } else if(bs>0&&c.borderStyle==='arch'){
    borderHtml='<div style="position:absolute;top:'+bo+'px;left:'+bo+'px;right:'+bo+'px;bottom:'+bo+'px;pointer-events:none;overflow:hidden">'+
      '<svg style="width:100%;height:100%" viewBox="0 0 100 140" preserveAspectRatio="none"><path d="M10 140V80Q50 30 90 80v60" fill="none" stroke="'+bcol+'" stroke-width="'+bs+'"/><circle cx="50" cy="55" r="4" fill="'+bcol+'" opacity="0.3"/></svg></div>';
  } else if(bs>0){
    borderHtml='<div style="position:absolute;top:'+bo+'px;left:'+bo+'px;right:'+bo+'px;bottom:'+bo+'px;pointer-events:none;box-sizing:border-box;border:'+bs+'px '+c.borderStyle+' '+bcol+';border-radius:2px"></div>';
  }
  var elemsHtml='<div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:'+Math.max(bo,10)+'px;direction:rtl">'+
    '<div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px">'+topEls+'</div>'+
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px">'+midEls+'</div>'+
    '<div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:6px">'+botEls+'</div></div>';
  wrap.innerHTML='<div style="position:relative;width:100%;height:100%;overflow:hidden;'+bgStyle+'">'+patHtml+borderHtml+elemsHtml+'</div>';
}

// Export cover as image via canvas
function exportCoverImage(callback){
  if(!bookMeta||!bookMeta.cover){callback(null);return;}
  const c=bookMeta.cover;
  const dims=getPageDims();
  const pw=c.width||dims.w;
  const ph=c.height||dims.h;
  // convert mm to px at 150dpi
  const dpi=300;
  const pxW=Math.round(pw*dpi/25.4);
  const pxH=Math.round(ph*dpi/25.4);
  const canvas=document.createElement('canvas');
  canvas.width=pxW; canvas.height=pxH;
  const ctx=canvas.getContext('2d');
  // bg
  if(c.bgType==='gradient'){
    const grad=ctx.createLinearGradient(0,0,pxW,0);
    grad.addColorStop(0,c.bgColor1);
    grad.addColorStop(1,c.bgColor2);
    ctx.fillStyle=grad;
  } else ctx.fillStyle=c.bgColor1;
  ctx.fillRect(0,0,pxW,pxH);
  // pattern
  if(c.patternId){
    const pat=COVER_PATTERNS.find(p=>p.id===c.patternId);
    if(pat){
      const svgData=pat.svg.replace('currentColor',c.bgColor1);
      const img=new Image();
      const patCanvas=document.createElement('canvas');
      patCanvas.width=60; patCanvas.height=60;
      const pctx=patCanvas.getContext('2d');
      const blob=new Blob([svgData],{type:'image/svg+xml'});
      const url=URL.createObjectURL(blob);
      img.onload=function(){
        pctx.clearRect(0,0,60,60);
        pctx.drawImage(img,0,0,60,60);
        ctx.globalAlpha=0.3;
        ctx.fillStyle=ctx.createPattern(patCanvas,'repeat');
        ctx.globalCompositeOperation=c.patternBlend||'multiply';
        ctx.fillRect(0,0,pxW,pxH);
        ctx.globalCompositeOperation='source-over';
        ctx.globalAlpha=1;
        URL.revokeObjectURL(url);
        drawCoverElements(ctx,pxW,pxH,c,dpi,callback,canvas);
      };
      img.onerror=function(){drawCoverElements(ctx,pxW,pxH,c,dpi,callback,canvas);};
      img.src=url;
      return;
    }
  }
  drawCoverElements(ctx,pxW,pxH,c,dpi,callback,canvas);
}

function drawCoverElements(ctx,pxW,pxH,c,dpi,callback,cnv){
  const _scale=pxW/500;
  var bo=Math.round((c.borderOffset||0)*_scale);
  var bs=c.borderSize>0?Math.round(c.borderSize*_scale):0;
  var bcol=c.borderColor||'#c4954a';
  // border with offset
  if(bs>0){
    ctx.save();
    if(c.borderStyle==='goldframe'){
      ctx.strokeStyle=bcol; ctx.lineWidth=bs;
      ctx.strokeRect(bo,bo,pxW-bo*2,pxH-bo*2);
      ctx.lineWidth=Math.max(1,bs/2);
      ctx.strokeRect(bo-bs*2,bo-bs*2,pxW-(bo-bs*2)*2,pxH-(bo-bs*2)*2);
    } else if(c.borderStyle==='arch'){
      ctx.strokeStyle=bcol; ctx.lineWidth=bs;
      ctx.strokeRect(bo,bo,pxW-bo*2,pxH-bo*2);
      ctx.beginPath();
      ctx.moveTo(bo,pxH-bo);
      ctx.quadraticCurveTo(pxW/2,bo*2,pxW-bo,pxH-bo);
      ctx.stroke();
      ctx.fillStyle=bcol; ctx.globalAlpha=0.3;
      ctx.beginPath();
      ctx.arc(pxW/2,bo+bs*3,bs*2,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    } else {
      ctx.strokeStyle=bcol; ctx.lineWidth=bs;
      ctx.setLineDash([]);
      if(c.borderStyle==='dashed')ctx.setLineDash([bs*3,bs*3]);
      else if(c.borderStyle==='dotted')ctx.setLineDash([bs,bs]);
      ctx.strokeRect(bo,bo,pxW-bo*2,pxH-bo*2);
      ctx.setLineDash([]);
    }
    ctx.restore();
  }
  // elements — split into top/mid/bottom by accent
  const pad=Math.max(bo,Math.round(20*_scale));
  const elW=pxW-pad*2;
  const gap=Math.round(8*_scale);
  const ch=pxH-pad*2;
  var topEls=[], midEls=[], botEls=[], posEls=[];
  (c.elements||[]).forEach(function(e){
    if(e.posX!=null||e.posY!=null) posEls.push(e);
    else{
      var a=(e.accent||'center');
      if(a==='top') topEls.push(e);
      else if(a==='bottom') botEls.push(e);
      else midEls.push(e);
    }
  });
  function drawElemList(list, startY){
    var yPos=startY;
    list.forEach(function(e){
      if(e.type==='line'){
      const lt=Math.round((e.lineThickness||2)*_scale)||1;
      const lh=lt;
      const lw=Math.round(elW*0.6);
      const lx=(pxW-lw)/2;
      ctx.strokeStyle=e.lineColor||'#c4954a';
      ctx.lineWidth=lt;
      ctx.globalAlpha=(e.lineOpacity||80)/100;
      if(e.lineStyle==='double'){ctx.lineWidth=lt;ctx.beginPath();ctx.moveTo(lx,yPos+1);ctx.lineTo(lx+lw,yPos+1);ctx.moveTo(lx,yPos+lt+1);ctx.lineTo(lx+lw,yPos+lt+1);ctx.stroke();}
      else{ctx.beginPath();ctx.moveTo(lx,yPos+lh/2);ctx.lineTo(lx+lw,yPos+lh/2);ctx.stroke();}
      ctx.globalAlpha=1;
      yPos+=lh+gap;
    } else if(e.type==='symbol'){
      const ss=Math.round((e.symSize||28)*_scale);
      ctx.fillStyle=e.symColor||'#c4954a';
      ctx.globalAlpha=(e.symOpacity||80)/100;
      ctx.font=ss+'px "Noto Nastaliq Urdu",serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(e.symChar||'✦',pxW/2,yPos+ss/2);
      ctx.globalAlpha=1;
      yPos+=ss+gap;
    } else {
      const fs=Math.round((e.size||20)*_scale);
      const f=e.font||'Noto Nastaliq Urdu';
      ctx.fillStyle=e.color||'#ffffff';
      ctx.font=(e.bold?'bold ':'')+(e.italic?'italic ':'')+fs+'px "'+f+'",serif';
      ctx.textAlign=e.align==='center'?'center':e.align==='right'?'right':'left';
      ctx.textBaseline='middle';
      ctx.underline=e.underline||false;
      const tx=e.text||'';
      let txW=ctx.measureText(tx).width;
      const maxTxW=elW*0.9;
      let drawSize=fs;
      if(txW>maxTxW){drawSize=Math.floor(fs*maxTxW/txW);ctx.font=(e.bold?'bold ':'')+(e.italic?'italic ':'')+drawSize+'px "'+f+'",serif';txW=ctx.measureText(tx).width;}
      let txX=e.align==='center'?pxW/2:e.align==='right'?pxW-pad:pad;
      // shape bg
      if(e.shape&&e.shape!=='none'&&e.shapeBgAlpha>0){
        const r=Math.round((e.shape==='pill'?30:e.shape==='round'?8:2)*_scale);
        const bga=Math.round(e.shapeBgAlpha*2.55);
        const padB=Math.round(6*_scale);
        ctx.fillStyle=(e.shapeBgColor||e.color)+bga.toString(16).padStart(2,'0');
        ctx.beginPath();
        const bx=txX-(e.align==='center'?txW/2:0)-padB;
        var pad8=Math.round(8*_scale);
        var sy=yPos-drawSize/2-pad8;
        var sh=drawSize+pad8*2;
        if(ctx.roundRect) ctx.roundRect(bx,sy,Math.min(txW+padB*2,maxTxW+padB*2),sh,r);
        else ctx.rect(bx,sy,Math.min(txW+padB*2,maxTxW+padB*2),sh);
        ctx.fill();
      }
      // underline
      if(e.underline){ctx.beginPath();ctx.moveTo(e.align==='center'?pxW/2-txW/2:txX,yPos+drawSize/2+2);ctx.lineTo(e.align==='center'?pxW/2+txW/2:txX+txW,yPos+drawSize/2+2);ctx.strokeStyle=e.color;ctx.lineWidth=1;ctx.stroke();}
      // accent position
      const aPos=e.accent||'center';
      if(aPos==='right')ctx.textAlign='right';
      else if(aPos==='left')ctx.textAlign='left';
      else ctx.textAlign='center';
      ctx.fillStyle=e.color||'#ffffff';
      ctx.font=(e.bold?'bold ':'')+(e.italic?'italic ':'')+drawSize+'px "'+f+'",serif';
      ctx.fillText(tx,txX,yPos);
      yPos+=drawSize*(e.lineHeight||1.4)+gap;
    }
    });
    return yPos;
  }
  var curY=pad;
  if(topEls.length) curY=drawElemList(topEls,pad);
  // Calculate middle group height to center the entire group, not just the first element
  var midH=0;
  midEls.forEach(function(e){
    if(e.type==='line') midH+=Math.round((e.lineThickness||2)*_scale)+gap;
    else if(e.type==='symbol') midH+=Math.round((e.symSize||28)*_scale)+gap;
    else midH+=Math.round((e.size||20)*_scale)*(e.lineHeight||1.4)+gap;
  });
  var midStart=pad+(ch-(curY-pad)-midH)/2;
  if(midEls.length) drawElemList(midEls,midStart);
  if(botEls.length) drawElemList(botEls,pxH-pad-gap);
  // Draw positioned elements
  posEls.forEach(function(e){
    var px=Math.round((e.posX!=null?e.posX:50)/100*pxW);
    var py=Math.round((e.posY!=null?e.posY:50)/100*pxH);
    if(e.type==='line'){
      var lt=Math.round((e.lineThickness||2)*_scale)||1;
      ctx.strokeStyle=e.lineColor||'#c4954a';
      ctx.lineWidth=lt;
      ctx.globalAlpha=(e.lineOpacity||80)/100;
      var lw=Math.round(pxW*0.48); // 80% container × 60% line width
      ctx.beginPath(); ctx.moveTo(px-lw/2,py); ctx.lineTo(px+lw/2,py); ctx.stroke();
      ctx.globalAlpha=1;
    } else if(e.type==='symbol'){
      var ss=Math.round((e.symSize||28)*_scale);
      ctx.fillStyle=e.symColor||'#c4954a';
      ctx.globalAlpha=(e.symOpacity||80)/100;
      ctx.font=ss+'px "'+(e.symFont||'Noto Nastaliq Urdu')+'",serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(e.symChar||'✦',px,py);
      ctx.globalAlpha=1;
    } else {
      var fs=Math.round((e.size||20)*_scale);
      var f=e.font||'Noto Nastaliq Urdu';
      ctx.fillStyle=e.color||'#ffffff';
      ctx.font=(e.bold?'bold ':'')+(e.italic?'italic ':'')+fs+'px "'+f+'",serif';
      ctx.textAlign=e.align==='center'?'center':e.align==='right'?'right':'left';
      ctx.textBaseline='middle';
      var tx=e.text||'';
      var txW=ctx.measureText(tx).width;
      // shape bg for positioned text
      if(e.shape&&e.shape!=='none'&&e.shapeBgAlpha>0){
        var rr=Math.round((e.shape==='pill'?30:e.shape==='round'?8:2)*_scale);
        var bga=Math.round(e.shapeBgAlpha*2.55);
        var pb=Math.round(6*_scale);
        ctx.fillStyle=(e.shapeBgColor||e.color)+bga.toString(16).padStart(2,'0');
        ctx.beginPath();
        var bxx=e.align==='center'?px-txW/2-pb:e.align==='right'?px-pb:px;
        var bw=txW+pb*2, bh=fs+pb*2;
        if(ctx.roundRect) ctx.roundRect(bxx,py-fs/2-pb,bw,bh,rr);
        else ctx.rect(bxx,py-fs/2-pb,bw,bh);
        ctx.fill();
        ctx.fillStyle=e.color||'#ffffff';
        ctx.font=(e.bold?'bold ':'')+(e.italic?'italic ':'')+fs+'px "'+f+'",serif';
      }
      ctx.fillText(tx,px,py);
    }
  });
  if(callback && cnv) cnv.toBlob(function(blob){callback(blob,cnv);},'image/jpeg',0.95);
}

      h='<div style="width:100%;display:flex;justify-content:'+j+'"><span style="'+allS+'">'+esc(e.text||'')+'</span></div>';

    if(e.posX!=null||e.posY!=null) mEl+='<div style="position:absolute;left:'+(e.posX!=null?e.posX:50)+'%;top:'+(e.posY!=null?e.posY:50)+'%;transform:translate(-50%,-50%);width:80%">'+h+'</div>';

    else if(acc==='bottom') bEl+='<div style="width:100%">'+h+'</div>';
    else mEl+='<div style="width:100%">'+h+'</div>';
  });
  var bo=c.borderOffset||0, bs=c.borderSize||0, bcol=c.borderColor||'#c4954a';
  let borderHtml='';
  if(bs>0&&c.borderStyle==='goldframe'){
    borderHtml='<div style="position:absolute;top:'+bo+'px;left:'+bo+'px;right:'+bo+'px;bottom:'+bo+'px;pointer-events:none;border:'+bs+'px solid '+bcol+';border-radius:4px;box-shadow:0 0 0 '+Math.max(bs,2)+'px '+bcol+',0 0 0 '+Math.max(bs*2,4)+'px '+bcol+';opacity:0.6"></div>';

      '<svg style="width:100%;height:100%" viewBox="0 0 100 140" preserveAspectRatio="none"><path d="M10 140V80Q50 30 90 80v60" fill="none" stroke="'+bcol+'" stroke-width="'+bs+'"/><circle cx="50" cy="55" r="4" fill="'+bcol+'" opacity="0.3"/></svg></div>';
  } else if(bs>0){
    borderHtml='<div style="position:absolute;top:'+bo+'px;left:'+bo+'px;right:'+bo+'px;bottom:'+bo+'px;pointer-events:none;border:'+bs+'px '+c.borderStyle+' '+bcol+'"></div>';
  }
  var pad=Math.max(bo,10);
  return '<div style="position:relative;width:100%;height:100vh;overflow:hidden;'+bgStyle+';box-sizing:border-box">'+patHtml+borderHtml+
    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;padding:'+pad+'px;direction:rtl">'+
    '<div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:8px">'+tEl+'</div>'+
    '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px">'+mEl+'</div>'+
    '<div style="flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:8px">'+bEl+'</div></div></div>';
}

    var blob=new Blob([html],{type:'text/html'});

// ── RICH CHILDREN HTML RENDERER (for preview) ──
function renderRichChildrenHTML(children, isHorizontal, parentRS){
  let html='';
  var flexCard=isHorizontal?'flex:1;min-width:0;':'';
  var innerBg='#faf8f4';
  var innerRadius='10px';
  if(parentRS&&parentRS.innerFillColor){
    innerBg=parentRS.innerFillColor;
    if(parentRS.innerFillDir&&parentRS.innerFillDir!=='none'){
      var dirs={right:'to left',left:'to right',top:'to bottom',bottom:'to top'};
      var end=parentRS.innerFillEnd||100;
      innerBg='linear-gradient('+(dirs[parentRS.innerFillDir]||'to bottom')+','+parentRS.innerFillColor+' 0%,transparent '+end+'%)';
    }
  }
  if(parentRS&&parentRS.innerShape==='pill') innerRadius='999px';
  else if(parentRS&&parentRS.innerShape==='box') innerRadius='4px';
  else if(parentRS&&parentRS.innerShape==='none') innerRadius='0';
  (children||[]).forEach(child=>{
    if(child.isRich){
      const rs=child.richStyleId?getRichStyle(child.richStyleId):null;
      const rcss=rs?richStyleToCSS(rs):'padding:8px;';
      html+=`<div style="${flexCard}border:1px solid #e0ddd6;border-radius:${innerRadius};background:${innerBg};padding:12px;${rcss}">${renderRichChildrenHTML(child.children||[], isHorizontal, rs)}</div>`;
    } else {
      const cs=getStyle(child.styleId)||styles[0];
      const ccss=styleToCSS(cs);
      var cardStyle=flexCard+'border:1px solid #e0ddd6;border-radius:'+innerRadius+';background:'+innerBg+';padding:12px;';
      if(cs.type==='bullet'){
        const acc=cs.accentBar?`border-right:3px solid ${cs.barColor};padding-right:10px;`:'';
        var bulHtml='';
        (child.text||'').split('\n').filter(l=>l.trim()).forEach(l=>{
          bulHtml+=`<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px;direction:rtl;${acc}font-family:'${cs.font}',serif;font-size:${cs.size}px;color:${cs.color};line-height:${cs.lineHeight};"><span style="color:${cs.barColor||'#c4954a'};flex-shrink:0">${cs.symbol||'•'}</span><span style="flex:1;text-align:right">${esc(l)}</span></div>`;
        });
        html+=`<div style="${cardStyle}">${bulHtml}</div>`;
      } else if(cs.type==='table'){
        const thtml=renderTable(child.text||'',cs);
        if(thtml)html+=`<div style="${cardStyle};overflow-x:auto">${thtml}</div>`;
      } else if(cs.type==='line'){
        html+=`<div style="${cardStyle};display:flex;align-items:center;justify-content:center;direction:ltr">${ornamentalToHTML(cs)}</div>`;
      } else if(cs.type==='symbol'){
        html+=`<div style="${cardStyle};display:flex;align-items:center;justify-content:center;direction:ltr">${ornamentalToHTML(cs)}</div>`;
      } else {
        html+=`<div style="${cardStyle}${ccss}">${(child.text||'').replace(/\n/g,'<br>')}</div>`;
      }
    }
  });
  return html;
}

// ── SHARED TABLE RENDERER ──
function renderTable(text, s, padH='6px 10px', padD='6px 10px'){
  const lines = text.split('\n').filter(l=>l.trim());
  if(!lines.length) return '';
  let tableHeader='', colHeaders=[], dataRows=[];
  lines.forEach(l=>{
    const isStar = l.trimStart().startsWith('*');
    const hasBar = l.includes('|');
    if(isStar && !hasBar){
      tableHeader = l.replace(/^\s*\*\s*/,'').trim();
    } else if(isStar && hasBar){
      colHeaders = l.replace(/^\s*\*\s*/,'').split('|').map(c=>c.trim()).filter(c=>c);
    } else if(hasBar){
      const cells = l.split('|').map(c=>c.trim()).filter(c=>c);
      if(cells.length) dataRows.push(cells);
    }
  });
  const cols = colHeaders.length || (dataRows[0]?.length||0);
  if(!cols && !tableHeader) return '';
  const bw = s.borderWidth||1;
  const bc = s.borderColor||'#d8d0c0';
  const font = `font-family:'${s.font}',serif;font-size:${s.size||14}px;color:${s.color||'#2a2520'};text-align:${s.align||'right'};direction:rtl;`;
  let html = `<table style="width:100%;border-collapse:collapse;direction:rtl;${font}">`;
  // table header row — spans all cols
  if(tableHeader){
    const spanCols = cols||1;
    html+=`<tr><th colspan="${spanCols}" style="padding:${padH};background:${s.headerColor||'#d4c4a0'};border:${bw}px solid ${bc};font-weight:700;text-align:center;direction:rtl;">${esc(tableHeader)}</th></tr>`;
  }
  // column header row
  if(colHeaders.length){
    html+=`<tr>${colHeaders.map(c=>`<th style="padding:${padH};background:${s.colHeaderColor||'#e8dfc8'};border:${bw}px solid ${bc};font-weight:600;direction:rtl;">${esc(c)}</th>`).join('')}</tr>`;
  }
  // data rows
  dataRows.forEach((cells,ri)=>{
    const rowBg = s.altRows&&ri%2===1?(s.altRowColor||'#f4f0e8'):(s.cellColor||'#faf8f4');
    html+=`<tr>${cells.map((c,ci)=>{
      const cbg=s.altCols&&ci%2===1?'rgba(196,149,74,0.07)':rowBg;
      return`<td style="padding:${padD};background:${cbg};border:${bw}px solid ${bc};direction:rtl;">${esc(c)}</td>`;
    }).join('')}</tr>`;
  });
  html+='</table>';
  return html;
}

  strip.classList.remove('hidden');

  if(!b.text.trim()){el.innerHTML='';return;}
  const css=styleToCSS(s);

    const acc=s.accentBar?`border-right:3px solid ${s.barColor};padding-right:10px;`:'';
    let html=`<div style="margin:0;${acc}">`;
    b.text.split('\n').filter(l=>l.trim()).forEach(l=>{
      html+=`<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px;direction:rtl;font-family:'${s.font}',serif;font-size:${s.size}px;color:${s.color};line-height:${s.lineHeight};"><span style="color:${s.barColor||'#c4954a'};flex-shrink:0">${s.symbol||'•'}</span><span style="flex:1;text-align:right">${esc(l)}</span></div>`;
    });
    html+='</div>';

    const thtml=renderTable(b.text,s,'4px 8px','4px 8px');
    el.innerHTML=thtml?`<div style="overflow-x:auto">${thtml}</div>`:'';
  } else {
    el.innerHTML=`<div style="${css}">${b.text.replace(/\n/g,'<br>')}</div>`;

function exportJSON(){
  var bName=getBookName();
  var fn=bName+'.json';
  var data={version:1,name:bName,styles:styles,blocks:blocks,nextBlockId:nextBlockId,nextStyleId:nextStyleId,richStyles:richStyles,pageSetup:pageSetup};
  var jsonText=JSON.stringify(data,null,2);
  getBookDir(bName).then(function(bookDir){
    if(bookDir){
      writeToDir(bookDir,[{name:fn,text:jsonText,type:'application/json'}]);
    } else {
      var blob=new Blob([jsonText],{type:'application/json'});
      var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fn;a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href);},100);
    }
  });
}

function importJSON(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json,application/json';
  input.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.version||!data.blocks||!data.styles)throw new Error('Invalid format');
        styles=data.styles;
        blocks=data.blocks;
        nextBlockId=data.nextBlockId||100;
        nextStyleId=data.nextStyleId||200;
        activeBlockId=null;
        bookMeta=data.bookMeta||null;
        if(data.pageSetup)pageSetup=data.pageSetup;
        if(data.name)document.getElementById('filename-input').value=data.name;
        localStorage.setItem('kitab_styles',JSON.stringify(styles));
        renderStylesList();
renderRichStylesList();
        renderBlocks();
        if(currentTab==='preview')renderPreview();
      }catch(err){alert('Could not load file: '+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

const PAGE_SIZES={A4:{w:210,h:297},A5:{w:148,h:210},B5:{w:176,h:250},Letter:{w:216,h:279},Legal:{w:216,h:356},'5x8':{w:127,h:203},'6x9':{w:152,h:229},'5.5x8.5':{w:140,h:216},'7x10':{w:178,h:254},'8.5x11':{w:216,h:279}};
function getPageDims(){
  if(pageSetup.pageSize==='Custom') return {w:pageSetup.customWidth||127,h:pageSetup.customHeight||203};
  const base=PAGE_SIZES[pageSetup.pageSize]||PAGE_SIZES.A4;
  return pageSetup.orientation==='landscape'?{w:base.h,h:base.w}:{w:base.w,h:base.h};
}

  const container=document.getElementById('book-container');

  const mr=ml;
  const mt=pageSetup.margins.top;
  const mb=pageSetup.margins.bottom;
  const fs=12*(pageSetup.typographyScale.fontSize/100);
  const lh=1.4*(pageSetup.typographyScale.lineHeight/100);
  const pages=genBookPages();

function calcBlockHeight(block){
  if(block.isRich&&block.children&&block.children.length>0){
    let h=0;
    block.children.forEach(child=>{
      const cs=getStyle(child.styleId);
      if(cs.type==='line'||cs.type==='symbol'){
        h+=5;
      }else if(child.isRich&&child.children){
        h+=calcBlockHeight(child);
      }else{
        h+=calcBlockHeight(child);
      }
    });
    return h;
  }
  const s=getStyle(block.styleId);
  if(s.type==='line'||s.type==='symbol'){
    return 5;
  }
  const fs=12*(pageSetup.typographyScale.fontSize/100);
  const lh=1.5*(pageSetup.typographyScale.lineHeight/100);
  const lineHeightMM=(fs*lh)/3.78;
  const charsPerLine=45;
  const textLines=Math.ceil(block.text.length/charsPerLine)||1;
  return textLines*lineHeightMM;
}
function genBookPages(){
  const dims=getPageDims();
  const mt=pageSetup.margins.top,mb=pageSetup.margins.bottom;
  const ml=Math.max(pageSetup.margins.inner,pageSetup.margins.outer),mr=ml;
  const pageContentHeight=dims.h-mt-mb;
  const h1NewPage=pageSetup.bookOptions.h1NewPage;
  const allBlocks=blocks.filter(b=>{
    if(b.isRich&&b.children&&b.children.length>0)return true;
    const st=getStyle(b.styleId);
    if(st.type==='line'||st.type==='symbol')return true;
    return b.text.trim();
  });
  const pages=[];
  let currentPage=[];
  let pageHeightUsed=0;
  allBlocks.forEach((b,i)=>{
    const s=getStyle(b.styleId);
    const isH1=s.id===1;
    const blockHeight=calcBlockHeight(b);
    if(h1NewPage&&isH1&&currentPage.length>0){
      pages.push(currentPage.join('<br>'));
      currentPage=[];
      pageHeightUsed=0;
    }
    if(blockHeight>pageContentHeight){
      const linesPerPage=Math.floor(pageContentHeight/18);
      const charsPerLine=45;
      const maxCharsPerPage=linesPerPage*charsPerLine;
      let remaining=b.text;
      while(remaining.length>0){
        const chunk=remaining.substring(0,maxCharsPerPage);
        remaining=remaining.substring(maxCharsPerPage);
        const chunkBlock={...b,text:chunk};
        const chunkHeight=calcBlockHeight(chunkBlock);
        if(pageHeightUsed+chunkHeight>pageContentHeight&&currentPage.length>0){
          pages.push(currentPage.join('<br>'));
          currentPage=[];
          pageHeightUsed=0;
        }
        const html=renderBlockHTML(chunkBlock,s,false);
        currentPage.push(html);
        pageHeightUsed+=chunkHeight;
      }
    }else{
      if(pageHeightUsed+blockHeight>pageContentHeight&&currentPage.length>0){
        pages.push(currentPage.join('<br>'));
        currentPage=[];
        pageHeightUsed=0;
      }
      const html=renderBlockHTML(b,s,i===0);
      currentPage.push(html);
      pageHeightUsed+=blockHeight;
    }
  });
  if(currentPage.length>0)pages.push(currentPage.join('<br>'));
  return pages;
}
function renderBlockHTML(b,s,isFirst){
  if(b.isRich&&b.children&&b.children.length){
    let h='';
    var fd=b.flowDir==='horizontal'?'row':'column';
    var flexCard=b.flowDir==='horizontal'?'flex:1;min-width:0;':'';
    var rs=b.richStyleId?getRichStyle(b.richStyleId):null;
    var innerBg=rs&&rs.innerFillColor?rs.innerFillColor:'#faf8f4';
    if(rs&&rs.innerFillDir&&rs.innerFillDir!=='none'){
      var dirs={right:'to left',left:'to right',top:'to bottom',bottom:'to top'};
      var end=rs.innerFillEnd||100;
      innerBg='linear-gradient('+(dirs[rs.innerFillDir]||'to bottom')+','+rs.innerFillColor+' 0%,transparent '+end+'%)';
    }
    var innerRadius=rs&&rs.innerShape==='pill'?'999px':rs&&rs.innerShape==='rounded'?'10px':rs&&rs.innerShape==='box'?'4px':'0';
    b.children.forEach(child=>{
      const cs=getStyle(child.styleId);
      var card='<div style="'+flexCard+'border:1px solid #e0ddd6;border-radius:'+innerRadius+';background:'+innerBg+';padding:10px;margin-bottom:6px">';
      if(cs.type==='line'||cs.type==='symbol'){
        h+=card+ornamentalToHTML(cs)+'</div>';
      }else if(child.isRich){
        h+=card+renderBlockHTML(child,cs,false)+'</div>';
      }else{
        h+=card+renderBlockHTML(child,cs,false)+'</div>';
      }
    });
    return '<div style="display:flex;flex-direction:'+fd+';gap:8px;flex-wrap:'+(fd==='row'?'wrap':'nowrap')+'">'+h+'</div>';
  }
  if(s.type==='bullet'){
    let h='<div>';
    b.text.split('\n').filter(l=>l.trim()).forEach(l=>h+=`<div style="display:flex;gap:8px"><span style="color:${s.barColor||'#c4954a'}">${s.symbol||'•'}</span><span style="flex:1;text-align:right">${esc(l)}</span></div>`);
    return h+'</div>';
  }
  if(s.type==='line'||s.type==='symbol')return ornamentalToHTML(s);
  if(s.type==='table')return renderTable(b.text,s,'','');
  let txt=b.text;
  if(isFirst&&pageSetup.bookOptions.dropCap&&b.styleId!==6){
    txt='<span class="book-dropcap">'+txt.charAt(0)+'</span>'+txt.slice(1);
  }
  const fs=(s.size||16)*(pageSetup.typographyScale.fontSize/100);
  return`<div style="font-family:'${s.font}',serif;font-size:${fs}px;color:${s.color||'#000'};line-height:${s.lineHeight};text-align:${s.align||'right'}">${txt.replace(/\n/g,'<br>')}</div>`;
}

function splitBlocksIntoParts(blocks,method,itemsPerPart){
  if(method==='fixed'){
    var parts=[];
    for(var i=0;i<blocks.length;i+=itemsPerPart){
      parts.push(blocks.slice(i,i+itemsPerPart));
    }
    return parts.length>0?parts:[blocks];
  }
  var current=[];
  var parts=[];
  blocks.forEach(function(b){
    var isChapter=b.styleId===0||(method==='heading'&&b.styleId<=3);
    if(isChapter&&current.length>0){
      parts.push(current);
      current=[];
    }
    current.push(b);
  });
  if(current.length>0)parts.push(current);
  return parts.length>0?parts:[blocks];
}

    // text
    var css=styleToCSS(s);
    if(s.refStyle){
      var lines=(b.text||'').split('\n');
      var refText=lines.length>1?lines.pop():'';
      var mainText=lines.join('\n');
      var rc=s.refColor||'#c4954a';
      var ra=Math.round(30*2.55).toString(16).padStart(2,'0');
      var topHtml='<div style="border-radius:10px 10px 0 0;padding:14px;background:'+rc+ra+';font-size:inherit;line-height:inherit">'+esc(mainText).replace(/\n/g,'<br>')+'</div>';
      var bottomHtml='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;direction:rtl"><div style="flex:1;height:1px;background:'+rc+'"></div><span style="background:'+rc+';color:#fff;border-radius:999px;padding:6px 14px;font-size:12px;white-space:nowrap">'+esc(refText)+'</span></div>';
      txt='<div style="border:1px solid '+rc+'66;border-radius:12px;overflow:hidden;position:relative">'+topHtml+bottomHtml+'</div>';
    } else {
      txt=(b.text||'').replace(/\n/g,'<br>');
    }
    return '<div '+id+' style="'+css+';margin-bottom:14px">'+txt+'</div>';
  }

  // Recursive tree renderer for app parts
  function renderAppNode(node,parentIndent){
    parentIndent=parentIndent||0;
    var indent=node.indent||0;
    var step=Math.max(0,indent-parentIndent);
    var s=node.style;
    var railHtml='';
    if(step>0){
      railHtml='<div style="position:absolute;right:0;top:0;bottom:0;width:'+step+'px;pointer-events:none;z-index:1">'+
        '<div style="position:absolute;right:0;top:0;bottom:0;width:'+(s.lineWidth||1)+'px;border-right:'+(s.lineWidth||1)+'px '+(s.lineStyle||'solid')+' '+(s.lineColor||'#c4954a')+';"></div>'+
      '</div>';
    }
    var hasChildren=node.children&&node.children.length>0;
    var hasText=node.node&&node.node.text&&node.node.text.trim();
    var h='<div class="h-node" style="position:relative">'+railHtml;
    if(hasText){
      h+='<div class="h-heading" style="padding-right:'+step+'px;display:flex;align-items:center;gap:4px;direction:rtl;font-family:\''+s.font+'\',serif;font-size:calc('+s.size+'px * var(--font-scale,1));color:'+s.color+';line-height:'+s.lineHeight+';'+(s.bold?'font-weight:700':'')+'">'+
        '<span class="h-arrow">&#9660;</span>'+
        '<span style="flex:1;text-align:right">'+esc(node.node.text)+'</span>'+
      '</div>';
    }
    h+='<div class="h-content" style="padding-right:'+indent+'px">';
    node.content.forEach(function(cb){h+=renderBlockForApp(cb);});
    h+='</div>';
    if(hasChildren){
      h+='<div class="h-children">';
      node.children.forEach(function(c){h+=renderAppNode(c,indent);});
      h+='</div>';
    }
    h+='</div>';
    return h;
  }

      if(tree.orphans.length) html+='<div style="padding-right:20px">'+tree.orphans.map(function(ob){return renderBlockForApp(ob);}).join('')+'</div>';
      tree.forEach(function(n){html+=renderAppNode(n,0);});
    }
    html+='</div>';
    partsData[pnum]=html;
  });

  var js='var pd='+JSON.stringify(partsData)+',tp='+parts.length+',cp=0,nOpen=true,sOpen=false,fScale=1,orig=\'\';\n'+

    '    window.__sentinelObs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting&&cp<tp){window.__sentinelObs.disconnect();ld(cp+1);}});},{root:c,rootMargin:"400px"});\n'+
    '    window.__sentinelObs.observe(sentinel);\n'+
    '  }\n'+

    '}\n'+

    'function togN(){nOpen=!nOpen;var nav=document.getElementById("nav");nav.classList.toggle("closed",!nOpen);document.getElementById("nt").textContent=nOpen?"›":"‹";var c=document.getElementById("content");c.style.paddingRight=nOpen?(nav.offsetWidth+32)+"px":"60px";}\n'+
